<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Roboto:wght@400;700&family=Open+Sans&family=Lato:wght@400;700&family=Montserrat:wght@400;600&family=Source+Sans+Pro&family=Nunito&family=Poppins:wght@400;600&family=Raleway&family=Playfair+Display&family=Merriweather&family=Ubuntu&family=Noto+Sans&family=Fira+Code&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1629;--fg:#e8edf8;--ph:#4a5068;--sel:#4f8ef7;
  --mid:#2a3354;--alt:#1c2540;--acc2:#7c6af7;--grn:#4ec994;
  --border:#1c2540;--task-done:#4a5068;
  --tgl-bar:#2a3354;   /* toggle body left border — muted in dark, lighter in light */
}
html{
  height:100%;
  overflow-x:hidden;
  overflow-y:auto;
  background:var(--bg);color:var(--fg);
}
html::-webkit-scrollbar{display:none}  /* hide native — JS scrollbar used instead */
body{
  font-family:'Segoe UI','SF Pro Display','Helvetica Neue',Arial,sans-serif;
  font-size:14px;line-height:1.7;
  padding:8px 35px 120px 15px;
  min-height:100%;
  overflow:visible;
}
body::-webkit-scrollbar{display:none}
#gn-scrollbar{display:none}

/* ── Pure-JS custom scrollbar (always inside WebEngine, immune to Qt overlays) ── */
#js-sb-track{
  position:fixed;right:0;top:0;width:8px;height:100%;z-index:9990;
  background:transparent;pointer-events:none;
}
#js-sb-thumb{
  position:absolute;right:1px;width:6px;
  background:rgba(79,142,247,0.38);
  border-radius:3px;min-height:28px;
  cursor:pointer;pointer-events:all;
  transition:background 0.12s,width 0.12s,right 0.12s;
  display:none;
}
#js-sb-thumb:hover,#js-sb-thumb.dragging{
  background:rgba(79,142,247,0.72);width:8px;right:0;
}

/* ── Find / Search highlight ── */
mark.gn-find{background:#f0c060;color:#111;border-radius:2px;padding:0 1px}
mark.gn-find.gn-find-active{background:#ff7c00;color:#fff;border-radius:2px;
  box-shadow:0 0 0 2px #ff7c00;padding:0 1px}

/* ── Drag handle ── */
.blk-row{display:flex;align-items:flex-start;gap:0;position:relative;
         border-radius:6px;transition:background .1s;overflow:visible}
.blk-row:hover .drag-handle{opacity:.5}
.drag-handle{
  width:20px;height:28px;display:flex;align-items:center;justify-content:center;
  cursor:grab;opacity:0;transition:opacity .15s;color:var(--ph);
  font-size:10px;user-select:none;flex-shrink:0;pointer-events:none;
  padding-top:2px;letter-spacing:-2px;
}
.drag-handle:hover{opacity:1!important;color:var(--sel)}
.drag-handle:active{cursor:grabbing}
.blk-row.drag-over{border-top:2px solid var(--sel)}
.blk-row.dragging{opacity:.25}

/* Multi-select */
body.multi-selecting{user-select:none!important;-webkit-user-select:none!important}
body.multi-selecting *{user-select:none!important;-webkit-user-select:none!important}
.blk-row.multi-sel>.block,
.blk-row.multi-sel>.tgl-row>.tgl>.tgl-hdr>.tgl-title{
  background:rgba(79,142,247,.15)!important;border-radius:4px;
}

/* ── Typed block styles (Notion-style) ── */
.block[data-blk-type='h1']{font-size:2em;font-weight:700;line-height:1.3;margin:4px 0;letter-spacing:-.5px}
.block[data-blk-type='h2']{font-size:1.5em;font-weight:700;line-height:1.3;margin:4px 0}
.block[data-blk-type='h3']{font-size:1.2em;font-weight:600;line-height:1.3;margin:4px 0}
.block[data-blk-type='bullet']{padding-left:24px;position:relative}
.block[data-blk-type='bullet']::before{content:'•';position:absolute;left:6px;top:2px;color:var(--fg)}
.block[data-blk-type='numbered']{padding-left:28px;position:relative}
.block[data-blk-type='numbered']::before{content:attr(data-num)'.';position:absolute;left:2px;top:2px;color:var(--fg)}

/* ── Text block ── */
.block{
  flex:1;min-height:1.7em;outline:none;padding:2px 4px;
  word-break:break-word;white-space:pre-wrap;color:var(--fg);
  position:relative;-webkit-user-select:text;user-select:text;
  border-radius:4px;
}
.block.ph::before{
  content:attr(data-ph);color:var(--ph);pointer-events:none;
  position:absolute;top:2px;left:4px;
}
.block a{color:var(--sel);cursor:pointer;text-decoration:underline;text-underline-offset:2px}
/* ── Link hover tooltip ── */
.block a,.tgl-title a,.callout-children a,.quote-block a{position:relative}
.block a:hover::after,.tgl-title a:hover::after,
.callout-children a:hover::after,.quote-block a:hover::after{
  content:attr(href);
  position:absolute;bottom:calc(100% + 4px);left:0;transform:none;
  background:#10182a;color:#8ab4d4;font-size:10px;font-family:monospace;
  padding:3px 8px;border-radius:5px;border:1px solid #2a3354;
  white-space:nowrap;max-width:340px;overflow:hidden;text-overflow:ellipsis;
  pointer-events:none;z-index:9999;box-shadow:0 2px 10px rgba(0,0,0,.6);
}
.block a:hover{text-decoration:underline}
.block img{max-width:100%;vertical-align:middle;border-radius:4px}
.block h1{font-size:1.8em;font-weight:700;margin:4px 0;letter-spacing:-.5px;line-height:1.3}
.block h2{font-size:1.4em;font-weight:600;margin:4px 0;line-height:1.4}
.block h3{font-size:1.15em;font-weight:600;margin:4px 0;color:var(--sel)}
.block p{margin:4px 0}
.block ul,.block ol{margin:4px 0 4px 20px;padding:0}
.block li{margin:2px 0}
.block blockquote{
  border-left:3px solid var(--sel);padding:4px 12px;
  margin:4px 0;color:#8b95b0;font-style:italic;background:rgba(79,142,247,.05);
  border-radius:0 6px 6px 0;
}
.block code{
  background:rgba(79,142,247,.12);color:#a8d4ff;
  padding:1px 5px;border-radius:4px;font-family:monospace;font-size:.9em
}
/* Code block pre: force all pasted child nodes to inherit monospace + size
   so that even if execCommand lands styled spans, they look correct. */
.code-block{ font-family:monospace!important; font-size:13px!important; }
.code-block *{ font-family:inherit!important; font-size:inherit!important;
               color:inherit!important; background:none!important;
               line-height:inherit!important; white-space:pre!important; }

/* ── Task block ── */
.task-row{display:flex;align-items:flex-start;gap:8px;flex:1;padding:2px 4px}
.task-cb{
  width:16px;height:16px;margin-top:5px;flex-shrink:0;
  accent-color:var(--sel);cursor:pointer;
}
.task-text{
  flex:1;outline:none;color:var(--fg);word-break:break-word;
  white-space:pre-wrap;min-height:1.4em;border-radius:4px;padding:1px 2px;
}
.task-text.done{color:var(--task-done);text-decoration:line-through}
.task-text.ph::before{content:'Task…';color:var(--ph);position:absolute;pointer-events:none}
.task-text{position:relative}

/* ── Toggle ── */
.tgl-row{flex:1}
.tgl{border-radius:6px;margin:0}
.tgl-hdr{display:flex;align-items:center;gap:4px;padding:2px 0}
.tgl-arrow{
  width:20px;height:20px;display:flex;align-items:center;justify-content:center;
  font-size:10px;cursor:pointer;color:var(--ph);flex-shrink:0;
  border-radius:4px;user-select:none;transition:all .15s;
}
.tgl-arrow:hover{background:var(--alt);color:var(--fg)}
.tgl-title{
  flex:1;outline:none;font-weight:600;color:var(--fg);
  cursor:text;white-space:pre-wrap;word-break:break-word;padding:2px 4px;
  border-radius:4px;position:relative;
}
.tgl-title.ph::before{content:'Toggle title…';color:var(--ph);pointer-events:none;position:absolute;top:2px;left:4px}
.tgl-body{
  margin-left:24px;padding:2px 0 2px 12px;
  border-left:2px solid var(--tgl-bar);
}
.add-child-btn{
  margin-left:24px;padding:2px 8px;opacity:0;cursor:pointer;
  font-size:11px;color:var(--sel);border-radius:4px;transition:opacity .15s;
  display:inline-block;
}
.tgl:hover .add-child-btn{opacity:.6}
.add-child-btn:hover{opacity:1!important;background:var(--alt)}

/* ── Columns block ── */
.cols-outer{display:grid;gap:20px;width:100%;align-items:start}
.col-wrap{min-width:0}
.col-body{
  min-height:32px;padding:4px 8px;border:1px dashed var(--mid);border-radius:6px;
}
.col-body .blk-row:first-child{margin-top:0}
.col-resize-hint{
  display:flex;align-items:center;justify-content:center;gap:4px;
  margin-bottom:6px;font-size:11px;color:var(--ph);
}
.col-resize-hint select{
  background:var(--alt);color:var(--fg);border:1px solid var(--mid);border-radius:4px;
  font-size:11px;padding:1px 4px;cursor:pointer;
}
.col-del-btn{cursor:pointer;color:var(--ph);padding:0 3px;border-radius:3px}
.col-del-btn:hover{background:var(--alt);color:#e05c6a}
.cols-row-wrap{flex:1;min-width:0}

/* ── Image ── */
.img-outer{flex:1;margin:2px 0}
/* Broken / unloaded images → styled placeholder */
.img-wrap img[src]{min-width:40px;min-height:40px}
.img-wrap img:not([src]),.img-wrap img[src=""] {
  display:inline-block;width:200px;height:120px;
  background:var(--alt);border:1px dashed var(--mid);
  border-radius:6px;vertical-align:middle;
}
/* onerror placeholder injected by JS */
.img-broken{display:inline-flex;align-items:center;justify-content:center;
  width:200px;height:100px;background:var(--alt);border:1px dashed var(--mid);
  border-radius:6px;color:var(--ph);font-size:12px;gap:6px;vertical-align:middle}
.img-wrap{
  display:inline-block;position:relative;line-height:0;
  cursor:default;max-width:100%;
}
.img-wrap img{display:block;max-width:100%;border-radius:6px;pointer-events:none}
.img-wrap.sel img, .img-outer:focus-within img{outline:2px solid var(--sel);border-radius:6px}
/* Keyboard-navigable: show subtle outer glow when image outer div is focused */
.img-outer:focus-within{outline:none;box-shadow:0 0 0 2px var(--sel,#4f8ef7);border-radius:8px;}
.img-outer,.img-wrap{user-select:none;-webkit-user-select:none;-webkit-user-drag:none;cursor:pointer;}
.img-outer{min-height:40px;flex:1;}  /* flex:1 fills full line width so text-align can center .img-wrap */
.img-outer img{-webkit-user-drag:none;cursor:pointer;display:block;}
.img-handle{
  position:absolute;width:8px;height:8px;background:#fff;
  border:1.5px solid var(--sel);border-radius:2px;display:none;z-index:10;
}
.img-wrap.sel .img-handle{display:block}
.h-tl{top:-4px;left:-4px;cursor:nw-resize}
.h-tr{top:-4px;right:-4px;cursor:ne-resize}
.h-ml{top:calc(50% - 4px);left:-4px;cursor:w-resize}
.h-mr{top:calc(50% - 4px);right:-4px;cursor:e-resize}
.h-bl{bottom:-4px;left:-4px;cursor:sw-resize}
.h-br{bottom:-4px;right:-4px;cursor:se-resize}
.img-bar{
  position:absolute;top:-34px;left:50%;transform:translateX(-50%);
  background:#10182a;border:1px solid var(--mid);
  border-radius:8px;padding:4px 8px;display:none;gap:4px;
  white-space:nowrap;z-index:20;box-shadow:0 4px 16px rgba(0,0,0,.5);
}
.img-wrap.sel .img-bar{display:flex}
.img-bar button{
  background:transparent;border:none;color:var(--fg);
  font-size:11px;cursor:pointer;padding:3px 8px;border-radius:5px;
}
.img-bar button:hover{background:var(--alt)}

/* ── Embed ── */
.embed-outer{
  flex:1;margin:4px 0;border-radius:10px;overflow:hidden;
  border:1px solid var(--border);position:relative;
}
.embed-outer iframe{display:block;max-width:100%;border:none}
.embed-toolbar{
  display:flex;align-items:center;gap:4px;padding:5px 10px;
  background:var(--alt);border-bottom:1px solid var(--border);
  opacity:0;transition:opacity .2s;
}
.blk-row:hover .embed-toolbar,.embed-outer:focus-within .embed-toolbar{opacity:1}
.embed-toolbar button{
  background:transparent;color:var(--ph);border:none;
  padding:3px 8px;font-size:11px;cursor:pointer;border-radius:5px;
}
.embed-toolbar button:hover{background:var(--mid);color:var(--fg)}
.embed-toolbar .sep{flex:1}
.embed-del-btn{color:#e05c6a!important}
.embed-del-btn:hover{background:#e05c6a22!important}

/* ── Table ── */
.blk-table-wrap{flex:1;margin:4px 0;position:relative}
.blk-table-container{overflow-x:auto}
.blk-table-container::-webkit-scrollbar{height:4px}
.blk-table-container::-webkit-scrollbar-thumb{background:var(--mid);border-radius:2px}
.blk-table{border-collapse:collapse;width:100%;min-width:200px}
.blk-table td{
  border:1px solid var(--border);padding:8px 12px;min-width:80px;
  outline:none;word-break:break-word;vertical-align:top;
  color:var(--fg);
}
.blk-table tr:first-child td{}
.blk-table.has-header tr:first-child td{background:var(--alt);font-weight:700;color:var(--sel)}
.blk-table.has-col-header tr td:first-child{background:var(--alt);font-weight:700;color:var(--sel)}
.blk-table td:focus{background:rgba(79,142,247,.06);box-shadow:inset 0 0 0 1px var(--sel)}
/* Quote block */
.quote-block{border-left:4px solid var(--sel);background:rgba(79,142,247,.07);
  border-radius:0 6px 6px 0;padding:10px 16px;margin:2px 0;
  color:var(--fg);font-style:italic;outline:none;white-space:pre-wrap;
  word-break:break-word;position:relative;display:block;box-sizing:border-box;width:100%}
.quote-block:empty::before{content:attr(data-ph);color:var(--ph);pointer-events:none}
/* ── Callout block ── */
.callout-wrap{border-radius:8px;padding:10px 14px;display:flex;
  align-items:flex-start;gap:10px;margin:2px 0;box-sizing:border-box;
  transition:background .2s,border .2s;position:relative;max-width:100%;}
.callout-wrap[data-color="blue"]  {background:rgba(79,142,247,.12);border:1px solid rgba(79,142,247,.25)}
.callout-wrap[data-color="yellow"]{background:rgba(255,196,0,.12);  border:1px solid rgba(255,196,0,.3)}
.callout-wrap[data-color="green"] {background:rgba(52,199,89,.12);  border:1px solid rgba(52,199,89,.28)}
.callout-wrap[data-color="red"]   {background:rgba(255,59,48,.12);  border:1px solid rgba(255,59,48,.25)}
.callout-wrap[data-color="purple"]{background:rgba(175,82,222,.12); border:1px solid rgba(175,82,222,.28)}
.callout-wrap[data-color="gray"]  {background:rgba(142,142,147,.12);border:1px solid rgba(142,142,147,.25)}
.callout-wrap[data-color="orange"]{background:rgba(255,149,0,.12);  border:1px solid rgba(255,149,0,.28)}
.callout-icon{font-size:22px;line-height:1;cursor:pointer;user-select:none;
  flex-shrink:0;padding:2px 4px;border-radius:5px;transition:background .15s;
  min-width:32px;text-align:center;margin-top:2px}
.callout-icon:hover{background:rgba(255,255,255,.12)}
/* Children container — full nested block support */
.callout-children{flex:1;min-width:0;padding:0;}
.callout-children .blk-row:first-child .block:empty::before{
  content:attr(data-ph);color:var(--ph);pointer-events:none;position:absolute}
.callout-add-btn{margin-top:4px;margin-left:2px;padding:1px 8px;opacity:0;cursor:pointer;
  font-size:11px;color:var(--sel);border-radius:4px;transition:opacity .15s;display:inline-block}
.callout-wrap:hover .callout-add-btn{opacity:.55}
.callout-add-btn:hover{opacity:1!important;background:var(--alt)}
.callout-toolbar{position:absolute;top:-36px;left:50%;transform:translateX(-50%);
  background:#10182a;border:1px solid #2a3354;border-radius:8px;
  padding:4px 8px;display:none;gap:4px;white-space:nowrap;z-index:20;
  box-shadow:0 4px 16px rgba(0,0,0,.5);align-items:center;}
/* ── [[Note]] autocomplete menu ───────────────────────────── */
.wiki-menu{
  position:fixed;background:#141d35;border:1px solid #2a3354;
  border-radius:10px;padding:6px;z-index:99999;min-width:280px;max-width:340px;
  max-height:260px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.6);
}
.wiki-item{display:flex;align-items:center;gap:10px;padding:7px 12px;
  border-radius:6px;cursor:pointer;color:#c4cad8;font-size:13px;transition:background .1s}
.wiki-item:hover,.wiki-item.selected{background:#1c2540;color:#e8edf8}
.wiki-item .wi-icon{font-size:15px;flex-shrink:0}
.wiki-item .wi-title{font-weight:500}
.wiki-empty{color:#4a5068;font-size:12px;padding:10px 12px;text-align:center}

/* ── Slash Command Menu ──────────────────────────────────────────── */
.slash-menu{
  position:fixed;background:#141d35;border:1px solid #2a3354;
  border-radius:10px;padding:6px;z-index:99999;min-width:260px;max-width:300px;
  max-height:380px;overflow-y:auto;overflow-x:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  scrollbar-width:thin;scrollbar-color:#2a3354 transparent;
}
.slash-search{
  width:100%;background:#0f1629;color:#e8edf8;border:1px solid #2a3354;
  border-radius:6px;padding:6px 10px;font-size:12px;outline:none;
  box-sizing:border-box;margin-bottom:6px;
}
.slash-search:focus{border-color:#4f8ef7}
.slash-section{color:#4a5068;font-size:10px;font-weight:600;
  letter-spacing:.8px;text-transform:uppercase;padding:4px 8px 2px;
  margin-top:4px;}
.slash-item{display:flex;align-items:center;gap:10px;padding:7px 10px;
  border-radius:6px;cursor:pointer;transition:background .1s;
  color:#c4cad8;font-size:13px;}
.slash-item:hover,.slash-item.selected{background:#1c2540;color:#e8edf8;}
.slash-item.selected{outline:1px solid #4f8ef744}
.slash-icon{width:28px;height:28px;display:flex;align-items:center;
  justify-content:center;background:#1c2540;border-radius:6px;
  font-size:14px;flex-shrink:0;}
.slash-item.selected .slash-icon{background:#4f8ef722}
.slash-label{font-weight:500}
.slash-hint{color:#4a5068;font-size:11px;margin-left:auto;padding-left:8px}
.slash-sep{height:1px;background:#1c2540;margin:4px 0}

/* ── Notion-style add-column phantom cell ── */
/* ── Table add row/col buttons ── */
.tbl-outer{position:relative;display:block;max-width:100%;box-sizing:border-box}
.tbl-add-row{
  width:100%;height:20px;display:flex;align-items:center;justify-content:center;
  background:transparent;border:1px dashed #2a3354;border-radius:4px;
  color:#4a5068;font-size:11px;cursor:pointer;margin-top:3px;
  opacity:0;transition:opacity .2s;box-sizing:border-box;
}
.tbl-add-col{
  position:absolute;right:-24px;top:0;bottom:3px;width:20px;
  display:flex;align-items:center;justify-content:center;
  background:transparent;border:1px dashed #2a3354;border-radius:4px;
  color:#4a5068;font-size:11px;cursor:pointer;writing-mode:vertical-lr;
  opacity:0;transition:opacity .2s;
}
.tbl-outer:hover .tbl-add-row,
.tbl-outer:hover .tbl-add-col{opacity:1}
.tbl-add-row:hover{background:var(--alt);color:var(--sel);border-color:var(--sel);opacity:1!important}
.tbl-add-col:hover{background:var(--alt);color:var(--sel);border-color:var(--sel);opacity:1!important}
/* default header styling via class */
.blk-table.has-header tr:first-child td{background:var(--alt)!important;font-weight:700;color:var(--sel)}
.blk-table.has-col-header td:first-child{background:var(--alt)!important;font-weight:700;color:var(--sel)}
.tbl-add{
  background:transparent;border:none;color:var(--ph);cursor:pointer;
  padding:4px;font-size:16px;border-radius:4px;transition:all .15s;
}
.tbl-add:hover{color:var(--sel);background:var(--alt)}
.tbl-add-row{width:100%;margin-top:2px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.blk-table-wrap:hover .tbl-add-row{opacity:1}
.tbl-add-col{align-self:stretch;display:flex;align-items:center;opacity:0;transition:opacity .2s}
.blk-table-wrap:hover .tbl-add-col{opacity:1}

/* ── Block background colors ── */
.bg-gray{background:rgba(100,100,120,.1)!important;border-radius:6px}
.bg-blue{background:rgba(79,142,247,.1)!important;border-radius:6px}
.bg-purple{background:rgba(124,106,247,.1)!important;border-radius:6px}
.bg-green{background:rgba(78,201,148,.1)!important;border-radius:6px}
.bg-yellow{background:rgba(240,192,96,.1)!important;border-radius:6px}
.bg-red{background:rgba(224,92,106,.1)!important;border-radius:6px}
.bg-orange{background:rgba(255,140,60,.1)!important;border-radius:6px}
.bg-pink{background:rgba(255,160,200,.1)!important;border-radius:6px}

/* ── Inline tag highlight ── */
.inline-tag{
  border-radius:4px;padding:0 5px;font-size:.85em;font-weight:600;
  cursor:default;letter-spacing:.2px;
}

/* ── Inline Tag Chip (clickable #tag embedded in note text) ── */
/* ── Inline tag link (renders #tagname like a coloured URL) ── */
.tag-link{
  font-weight:600;cursor:pointer;
  user-select:text;-webkit-user-select:text;
  text-decoration:underline;text-underline-offset:2px;
  text-decoration-thickness:1px;
  border-radius:2px;padding:0 1px;
  transition:opacity .15s;
}
.tag-link:hover{ opacity:.72; }

/* ── Context menu ── */
.ctx-menu{
  position:fixed;background:#141d35;border:1px solid var(--mid);
  border-radius:10px;padding:5px;z-index:10000;min-width:175px;
  box-shadow:0 8px 32px rgba(0,0,0,.6);font-size:13px;
}

/* Soft-delete toast */
#del-toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(12px);
  background:var(--panel-bg,#1a2340ee);border:1px solid var(--border,#2a3560);
  border-radius:10px;padding:9px 18px;color:var(--fg-mid,#b0bcd8);
  font-size:13px;z-index:9999;opacity:0;pointer-events:none;
