function duplicateBlock(row){
  const container = row.parentElement || root;
  const isToggle   = !!row.querySelector(':scope>.tgl-row');
  const isImage    = !!row.querySelector(':scope>.img-outer');
  const isTask     = !!row.querySelector(':scope>.task-row');
  const isTable    = !!row.querySelector(':scope>.blk-table-wrap');
  const isCallout  = !!row.querySelector(':scope>.callout-wrap');
  const isCode     = !!row.querySelector(':scope>.code-outer');
  const colsOuter  = row.querySelector(':scope>div>.cols-outer') || row.querySelector(':scope>.cols-outer');
  let nr;
  if(colsOuter){
    const count = parseInt(colsOuter.dataset.colCount) || colsOuter.querySelectorAll(':scope>.col-wrap').length;
    const cols = [...colsOuter.querySelectorAll(':scope>.col-wrap>.col-body')].map(cb => serializeContainer(cb));
    nr = addColumnsRow(container, count, cols, false);
  } else if(isCode){
    const outer = row.querySelector('.code-outer');
    const pre   = outer.querySelector('.code-block');
    const code  = pre ? _getPreText(pre) : '';
    const align = outer.dataset.codeAlign || 'left';
    const w     = outer.dataset.codeW    || '100%';
    const _codeWrap = outer.dataset.codeWrap === '1';
    nr = addCodeRow(container, code, align, w);
    if(_codeWrap && nr){ const _co2=nr.querySelector('.code-outer'); if(_co2){_co2.dataset.codeWrap='1'; const _cp2=nr.querySelector('.code-block'); if(_cp2){_cp2.style.whiteSpace='pre-wrap';_cp2.style.overflowX='hidden';_cp2.style.wordBreak='break-all';} } }
  } else if(isToggle){
    const tgl = row.querySelector('.tgl');
    const t = tgl.querySelector('.tgl-title').innerHTML;
    const body = tgl.querySelector('.tgl-body');
    nr = addToggleRow(container, t, !tgl.dataset.closed, body?serializeContainer(body):[]);
  } else if(isCallout){
    const cw = row.querySelector('.callout-wrap');
    const icon = cw.querySelector('.callout-icon')?.textContent || '💡';
    const childrenDiv = cw.querySelector('.callout-children');
    const ch = childrenDiv ? serializeContainer(childrenDiv) : [];
    nr = addCalloutRow(container, icon, ch, cw.dataset.color||'blue',
                       cw.dataset.align||'left', cw.dataset.w||'100%');
  } else if(isImage){
    const img=row.querySelector('img'); const outer=row.querySelector('.img-outer');
    nr = addImageRow(container, img.src, parseInt(img.dataset.w)||0, outer.style.textAlign||'left', img.dataset.local||'');
  } else if(isTask){
    const cb=row.querySelector('.task-cb'); const txt=row.querySelector('.task-text');
    nr = addTaskRow(container, txt.innerHTML, cb.checked, genId());
  } else if(isTable){
    const tbl=row.querySelector('table'); const rows=[];
    tbl.querySelectorAll('tr').forEach(tr=>{ const rd=[]; tr.querySelectorAll('td').forEach(td=> rd.push({html:td.innerHTML,w:td.style.width})); rows.push(rd); });
    nr = addTableRow(container, rows);
  } else {
    const blk=row.querySelector('.block');
    if(blk) nr = addTextRow(container, blk.innerHTML);
  }
  if(nr && nr !== row){ for(const cls of row.classList){ if(cls.startsWith('bg-')) nr.classList.add(cls); } row.after(nr); notify(); }
}

// ── Paste handler — proper Word/HTML block reconstruction ────────────────────

// ── Catch inline images pasted by browser into contentEditable text blocks ──
// When our paste handler misses (no active row), browser pastes <img> inline.
// Convert any <img> found directly inside .block into a proper image block.
root.addEventListener('input', e => {
  const blk = tgt(e).closest('.block');
  if(!blk) return;
  const imgs = [...blk.querySelectorAll('img')];
  if(!imgs.length) return;
  const blkRow = blk.closest('.blk-row');
  if(!blkRow) return;
  imgs.forEach(img => {
    const src = img.src || img.getAttribute('src') || '';
    console.log('[input] found inline img in .block, src:', src.slice(0,80));
    img.remove(); // remove from text block
    const tid = genId();
    const _isrc = src.startsWith('blob:') ? '' : src;
    if(src && src.startsWith('blob:')){
      // blob: URL (Zalo, Teams etc) — do NOT create a placeholder row here.
      // updateImageSrc('__INSERT__', …) will call insertImage() which creates
      // the proper row itself.  Creating a row here + calling __INSERT__ leaves
      // an orphaned empty row that never gets updated (phantom placeholder).
      _lastFocusedRow = blkRow; _focusedContainer = blkRow.parentElement;
      console.log('[input] blob URL — setting lastFocusedRow, calling read_clipboard_image');
      if(window.bridge) window.bridge.read_clipboard_image('__INSERT__');
      // No addImageRow, no notify — insertImage will call notify when done.
      return;
    }
    const nr  = addImageRow(blkRow.parentElement, _isrc, 0, 'left');
    const ni  = nr.querySelector('img');
    if(ni){ ni.dataset.tid = tid; }
    const _ib = blkRow.querySelector('.block,.tgl-title');
    const _ie = !_ib || !_ib.textContent.trim();
    if(_ie){ blkRow.replaceWith(nr); } else { blkRow.after(nr); }
    if(src && src.startsWith('data:') && window.bridge){
      window.bridge.request_save_pasted_image(src, tid);
    } else if(src && window.bridge){
      console.log('[input] calling download_and_save_image for inline img');
      window.bridge.download_and_save_image(src, tid);
    }
    const _w = nr.querySelector('.img-wrap');
    if(_w) setTimeout(()=>selectImg(_w), 50);
    notify();
  });
});

document.addEventListener('paste', e => {
  // ── DEBUG: log ALL clipboard items immediately (before any guard) ─────────
  try{
    const _types = [...(e.clipboardData.types||[])];
    console.log('[paste] FIRED — types:', JSON.stringify(_types));
    for(let i=0;i<(e.clipboardData.items||[]).length;i++){
      const it=e.clipboardData.items[i];
      console.log('[paste] item['+i+']:', it.kind, it.type);
    }
    const _hp=(e.clipboardData.getData('text/html')||'').slice(0,400);
    if(_hp) console.log('[paste] html[:400]:', _hp);
  }catch(_e){ console.log('[paste] debug error:', _e); }
  // ─────────────────────────────────────────────────────────────────────────

  const sel = window.getSelection();
  if(!sel || !sel.rangeCount){
    console.log('[paste] ABORT: no selection/range'); return;
  }
  // activeRow: find closest .blk-row including those inside toggle/callout children
  const _anchorNode = sel.getRangeAt(0).commonAncestorContainer;
  const _anchorEl   = _anchorNode.nodeType === 1 ? _anchorNode : _anchorNode.parentElement;
  let activeRow = _anchorEl?.closest('.blk-row');

  // Fallback: use last focused row if cursor not in a block row
  if(!activeRow){
    activeRow = _lastFocusedRow;
  }
  if(!activeRow){
    const rows = root.querySelectorAll('.blk-row');
    if(rows.length) activeRow = rows[rows.length-1];
  }
  if(!activeRow){ return; }

  // Active container: toggle body, callout body, or root
  const _activeContainer = _focusedContainer && _focusedContainer.contains(activeRow)
    ? _focusedContainer
    : (activeRow.parentElement || root);

  // ── Image from clipboard ──────────────────────────────────────────────────
  let imgItem = null;
  if(e.clipboardData.items)
    for(let i=0;i<e.clipboardData.items.length;i++)
      if(e.clipboardData.items[i].type.startsWith('image/')){ imgItem=e.clipboardData.items[i]; break; }

  console.log('[paste] imgItem found:', !!imgItem, imgItem ? imgItem.type : 'none');

  // ── CODE BLOCK PASTE: if cursor is inside a <pre>, paste as plain text only ──
  // Without this, pasting HTML content (from browser, VS Code etc.) inserts
  // styled nodes into the pre, making the font huge or content landing outside.
  const _selNode = sel.getRangeAt(0).commonAncestorContainer;
  const _activePre = (_selNode.nodeType === 1 ? _selNode : _selNode.parentElement)?.closest('pre');
  if(_activePre && !imgItem){
    e.preventDefault();
    // Always paste as plain text inside code blocks
    const plain = e.clipboardData.getData('text/plain') ||
                  e.clipboardData.getData('text') || '';
    if(plain){
      document.execCommand('insertText', false, plain);
      notifyDebounced();
    }
    return;
  }

  // ── SMART URL PASTE: detect embeddable URLs pasted as plain text ──────────
  // When user pastes a bare URL (YouTube, Google Docs, Vimeo, Figma…) show
  // an inline popup: "Nhúng link này? [✅ Nhúng] [🔗 Giữ text] [✕]"
  if(!imgItem){
    const _plainUrl = (e.clipboardData.getData('text/plain') || '').trim();
    const _hasHtml  = !!(e.clipboardData.getData('text/html') || '').trim();
    if(_plainUrl && !_hasHtml && /^https?:\/\/\S+$/.test(_plainUrl)){
      const _embedSrc = _urlToEmbedSrc(_plainUrl);
      if(_embedSrc){
        e.preventDefault();
        // Insert as plain text so user sees what was pasted
        document.execCommand('insertText', false, _plainUrl);
        notifyDebounced();
        // Show embed popup after row is in DOM
        setTimeout(() => _showEmbedPopup(activeRow, _plainUrl, _embedSrc, _activeContainer), 100);
        return;
      }
    }
  }

  if(imgItem){
    e.preventDefault();
    console.log('[paste] PATH 1 — direct image item, reading blob...');
    const blob=imgItem.getAsFile(); const reader=new FileReader();
    reader.onload=ev=>{
      const dataUrl = ev.target.result;
      console.log('[paste] blob read OK, dataUrl length:', dataUrl.length,
                  'type:', dataUrl.slice(0,30));
      const tid = genId();
      const nr  = addImageRow(activeRow.parentElement, dataUrl, 0, 'left');
      const img = nr.querySelector('img');
      if(img){
        img.dataset.tid = tid;
        if(window.bridge){
          console.log('[paste] calling request_save_pasted_image, tid:', tid);
          window.bridge.request_save_pasted_image(dataUrl, tid);
        } else {
          console.log('[paste] ERROR: window.bridge not available!');
        }
      }
      // Smart placement: if current row is empty → replace it (like Notion).
      // If current row has content → insert image below it.
      const _blk = activeRow.querySelector('.block,.tgl-title');
      const _isEmpty = !_blk || !_blk.textContent.trim();
      if(_isEmpty){
        activeRow.replaceWith(nr);  // replace empty row with image
      } else {
        activeRow.after(nr);        // insert image after current row
      }
      // Always add an empty text row IMMEDIATELY after the image for typing
      const _emptyRow = addTextRow(activeRow.parentElement, '');
      nr.after(_emptyRow);          // move it right after the image (not at end)
      // Focus the empty row so user can keep typing
      const _eb = _emptyRow.querySelector('.block,.task-text');
      if(_eb) setTimeout(()=>{ _eb.focus(); placeCaretAtEnd(_eb); }, 30);
      // Auto-select so toolbar is immediately visible
      const wrap = nr.querySelector('.img-wrap');
      if(wrap) selectImg(wrap);
      showSaveToast('Hình ảnh');
      // Defer notify until the image has loaded so dataset.w is set correctly.
      // If the image loads quickly (data URL → sync) the rAF inside the load
      // listener will still run before the next paint, so there is no visible delay.
      const _imgForNotify = nr.querySelector('img');
      if(_imgForNotify && !_imgForNotify.complete){
        _imgForNotify.addEventListener('load', () => requestAnimationFrame(notify), {once:true});
      } else {
        requestAnimationFrame(notify);
      }
      console.log('[paste] PATH 1 done — row inserted (_isEmpty:', _isEmpty, '), tid:', tid);
    };
    reader.onerror = err => console.log('[paste] FileReader error:', err);
    reader.readAsDataURL(blob); return;
  }

  const html = e.clipboardData.getData('text/html');
  console.log('[paste] PATH 2 — no direct image, html length:', html.length);
  if(!html) return;

  // Only intercept if there are block-level elements to handle
  const BLOCK_TAGS = new Set(['P','DIV','H1','H2','H3','H4','H5','H6',
    'UL','OL','LI','TABLE','BLOCKQUOTE','FIGURE','IMG','SECTION','ARTICLE','HEADER']);
  const probe = document.createElement('div'); probe.innerHTML = html;
  const hasBlocks = [...probe.querySelectorAll('*')].some(el => BLOCK_TAGS.has(el.tagName));
  if(!hasBlocks) return;  // let browser handle inline paste natively

  e.preventDefault();

  // Extract fragment between Word clipboard markers if present
  let frag = html;
  if(html.includes('<!--StartFragment-->'))
    frag = html.split('<!--StartFragment-->')[1].split('<!--EndFragment-->')[0];

  const tmp = document.createElement('div'); tmp.innerHTML = frag;
  tmp.querySelectorAll('meta,style,script,noscript,link,xml,o\\:p').forEach(el=>el.remove());

  // ── Clean up Word-specific artifacts ─────────────────────────────────────
  // Remove empty paragraphs that Word inserts as spacers
  // Collapse runs of whitespace/nbsp within text nodes
  function cleanWordNode(node){
    if(node.nodeType === 3){
      node.textContent = node.textContent.replace(/\u00a0/g,' ');  // nbsp → space
      return;
    }
    node.childNodes.forEach(cleanWordNode);
  }
  cleanWordNode(tmp);

  // ── Convert DOM tree → flat list of block descriptors ────────────────────
  const blocks = [];

  function processBlock(el){
    if(el.nodeType === 3){
      // Bare text node at top level — wrap as paragraph
      const t = el.textContent.trim();
      if(t) blocks.push({t:'text', html: escapeHtml(t)});
      return;
    }
    if(el.nodeType !== 1) return;
    const tag = el.tagName.toUpperCase();
    if(['SCRIPT','STYLE','XML'].includes(tag)) return;

    if(tag === 'IMG'){
      blocks.push({t:'image', src:el.src, w:0, align:'left'}); return;
    }

    if(tag === 'TABLE'){
      const rows = [];
      el.querySelectorAll('tr').forEach(tr=>{
        const rd=[];
        tr.querySelectorAll('td,th').forEach(td=>{
          rd.push({html: td.innerHTML.trim()});
        });
        if(rd.length) rows.push(rd);
      });
      if(rows.length) blocks.push({t:'table', rows});
      return;
    }

    if(tag === 'UL' || tag === 'OL'){
      el.querySelectorAll(':scope>li').forEach(li=>{
        blocks.push({t:'text', html: inlineHtml(li), blockType: tag==='UL'?'bullet':'numbered'});
        // Handle nested lists
        li.querySelectorAll('ul,ol').forEach(sub=>processBlock(sub));
      });
      return;
    }

    if(tag === 'BLOCKQUOTE'){
      blocks.push({t:'quote', html: inlineHtml(el)}); return;
    }

    if(tag === 'LI'){
      blocks.push({t:'text', html: inlineHtml(el), blockType:'bullet'}); return;
    }

    // Block elements — check if they contain only inline content
    if(BLOCK_TAGS.has(tag)){
      const childBlockEls = [...el.children].filter(ch => BLOCK_TAGS.has(ch.tagName));
      if(childBlockEls.length === 0){
        // Purely inline — render as one text block
        const content = inlineHtml(el);
        if(content.trim()){
          const btype = tag==='H1'?'h1':tag==='H2'?'h2':tag==='H3'?'h3':'';
          blocks.push({t:'text', html:content, blockType:btype});
        }
      } else {
        // Mixed — recurse into children
        el.childNodes.forEach(ch=>{
          if(ch.nodeType===3){
            const t=ch.textContent.trim(); if(t) blocks.push({t:'text',html:escapeHtml(t)});
          } else if(ch.nodeType===1){
            if(BLOCK_TAGS.has(ch.tagName)) processBlock(ch);
            else { const h=ch.outerHTML.trim(); if(h) blocks.push({t:'text',html:h}); }
          }
        });
      }
      return;
    }

    // Fallback — treat as inline text
    const h = el.outerHTML.trim();
    if(h) blocks.push({t:'text', html:h});
  }

  // Convert inner HTML of an element to clean inline HTML
  function inlineHtml(el){
    const clone = el.cloneNode(true);
    // Remove nested block elements
    clone.querySelectorAll('ul,ol,table,blockquote').forEach(n=>n.remove());
    // Collapse multiple spaces/newlines
    let h = clone.innerHTML.trim()
      .replace(/\s*\n\s*/g,' ')     // newlines → space
      .replace(/  +/g,' ')          // multiple spaces → single
      .replace(/&nbsp;/g,' ')       // nbsp → space
      .trim();
    return h;
  }

  function escapeHtml(t){
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  tmp.childNodes.forEach(ch => processBlock(ch));

  // Remove empty blocks
  const filtered = blocks.filter(b => b.html?.trim() || b.t==='image' || b.t==='table');

  // ── Insert blocks into editor ─────────────────────────────────────────────
  let cur = activeRow;
  const cont = activeRow.parentElement;

  filtered.forEach(b => {
    let nr = null;
    if(b.t === 'text'){
      nr = addTextRow(cont, b.html||'');
      if(b.blockType && nr){
        const blk = nr.querySelector('.block');
        if(blk) blk.dataset.blkType = b.blockType;
      }
    } else if(b.t === 'quote'){
      nr = addQuoteRow(cont, b.html||'', 'left', '100%');
    } else if(b.t === 'image'){
      // Don't pass blob: URLs as img src — QWebEngine rejects them
      const _displaySrc = (b.src||'').startsWith('blob:') ? '' : (b.src||'');
      nr = addImageRow(cont, _displaySrc, b.w, b.align);
      // Save image to vault via Python (bypasses CORS — Python has no browser restrictions).
      // JS fetch fails for cross-origin URLs (Facebook, Twitter CDN etc).
      // Python download_and_save_image uses urllib with proper headers.
      console.log('[paste] PATH 2 image block — src:', (b.src||'').slice(0,80));
      if(b.src && window.bridge){
        const _tid = genId();
        const _img = nr && nr.querySelector('img');
        if(_img){ _img.dataset.tid = _tid; }
        if(b.src.startsWith('data:')){
          console.log('[paste] PATH 2 — data URL, calling request_save_pasted_image');
          window.bridge.request_save_pasted_image(b.src, _tid);
        } else if(b.src.startsWith('blob:')){
          // blob: URLs belong to the source app context (Zalo, etc.) and cannot
          // be fetched from here. Ask Python to read the image from Windows
          // clipboard directly using PIL.ImageGrab — no URL needed.
          // Show a "loading…" label on the placeholder so the user can see
          // the image is being processed, not broken.
          console.log('[paste] PATH 2 — blob URL (Zalo etc), using read_clipboard_image');
          if(_img){
            _img.title = '⏳ Đang xử lý hình ảnh…';
            _img.style.opacity = '0.5';
          }
          window.bridge.read_clipboard_image(_tid);
        } else {
          console.log('[paste] PATH 2 — remote URL, calling download_and_save_image');
          window.bridge.download_and_save_image(b.src, _tid);
        }
      } else {
        console.log('[paste] PATH 2 — no src or no bridge, src:', b.src&&b.src.slice(0,60));
      }
      // Smart placement for HTML-path images
      if(nr){
        // Placement happens later in the block rendering loop — handled at end
        const _w = nr.querySelector('.img-wrap');
        if(_w) setTimeout(()=>{ selectImg(_w); console.log('[paste] selectImg called on pasted img'); }, 80);
        else console.log('[paste] WARNING: no .img-wrap found in image row');
      }
    } else if(b.t === 'table'){
      nr = addTableRow(cont, b.rows||[]);
    }
    if(nr){ cur.after(nr); cur = nr; }
  });

  // Remove the original empty active row
  const oldBlk = activeRow.querySelector('.block,.tgl-title');
  if(oldBlk && !oldBlk.textContent.trim()) activeRow.remove();

  // Focus: try last inserted block's text area; if image, find next text row
  if(cur){
    const _fb = cur.querySelector('.block,.task-text');
    if(_fb){ _fb.focus(); placeCaretAtEnd(_fb); }
    else {
      // Last block is an image — add empty row after it for typing
      const _er = addTextRow(cont, ''); cur.after(_er);
      const _eb = _er.querySelector('.block'); if(_eb){ _eb.focus(); placeCaretAtEnd(_eb); }
    }
  }
  notify();
});

// ── Utilities ─────────────────────────────────────────────────────────────────
function placeCaretAtEnd(el){ el.focus(); const r=document.createRange(); r.selectNodeContents(el); r.collapse(false); const s=window.getSelection(); s.removeAllRanges(); s.addRange(r); }

// ── addCalloutRow — Notion-style callout block ────────────────────────────────
const CALLOUT_COLORS = ['blue','yellow','green','red','purple','gray','orange'];
const CALLOUT_COLOR_HEX = {blue:'#4f8ef7',yellow:'#ffc400',green:'#34c759',
  red:'#ff3b30',purple:'#af52de',gray:'#8e8e93',orange:'#ff9500'};

function _applyCalloutLayout(wrap, align, w){
  wrap.style.width = w || '100%';
  if((align||'left') === 'center'){ wrap.style.marginLeft='auto'; wrap.style.marginRight='auto'; }
  else if(align === 'right')      { wrap.style.marginLeft='auto'; wrap.style.marginRight='0'; }
  else                             { wrap.style.marginLeft='0';   wrap.style.marginRight='0'; }
}

function addCalloutRow(container, icon, children, color, align, w, bg){
  align = align || 'left'; w = w || '100%';
  const row = document.createElement('div'); row.className = 'blk-row';
  if(bg) row.classList.add(bg);
  row.appendChild(makeDragHandle());

  const wrap = document.createElement('div');
  wrap.className = 'callout-wrap';
  wrap.dataset.color = color || 'blue';
  wrap.dataset.align = align;
  wrap.dataset.w     = w;
  _applyCalloutLayout(wrap, align, w);

  // ── Floating toolbar ──────────────────────────────────────────────────────
  const toolbar = document.createElement('div');
  toolbar.className = 'callout-toolbar';

  const mkTB = (txt, fn, title) => {
    const b = document.createElement('button'); b.textContent = txt;
    if(title) b.title = title;
    b.style.cssText = 'background:transparent;border:none;color:#e8edf8;font-size:11px;' +
                      'cursor:pointer;padding:3px 7px;border-radius:5px;white-space:nowrap;';
    b.onmouseover = () => b.style.background = '#2a3354';
    b.onmouseout  = () => b.style.background = 'transparent';
    b.onmousedown = ev => { ev.preventDefault(); fn(b); };
    return b;
  };
  const mkSep = () => {
    const s = document.createElement('div');
    s.style.cssText = 'width:1px;background:#2a3354;margin:2px 4px;align-self:stretch;';
    return s;
  };

  const wLabel = document.createElement('span');
  wLabel.textContent = 'W:'; wLabel.style.cssText = 'color:#8a93b2;font-size:10px;margin-right:2px;';
  toolbar.appendChild(wLabel);
  ['25%','50%','75%','100%'].forEach(ww => toolbar.appendChild(mkTB(ww, () => {
    wrap.dataset.w = ww; wrap.style.width = ww; notify();
  }, `Width ${ww}`)));
  toolbar.appendChild(mkSep());

  [['◀','left'],['■','center'],['▶','right']].forEach(([lbl, a]) =>
    toolbar.appendChild(mkTB(lbl, () => {
      wrap.dataset.align = a; _applyCalloutLayout(wrap, a, wrap.dataset.w); notify();
    }, `Align ${a}`))
  );
  toolbar.appendChild(mkSep());

  const cLabel = document.createElement('span');
  cLabel.textContent = '🎨'; cLabel.style.cssText = 'font-size:12px;cursor:default;';
  toolbar.appendChild(cLabel);
  CALLOUT_COLORS.forEach(c => {
    const chip = document.createElement('button');
    chip.style.cssText = `width:14px;height:14px;border-radius:50%;cursor:pointer;
      border:2px solid ${wrap.dataset.color===c?'#fff':'transparent'};flex-shrink:0;
      background:${CALLOUT_COLOR_HEX[c]};padding:0;`;
    chip.title = c; chip.dataset.colorChip = c;
    chip.onmouseover = () => chip.style.opacity='0.8';
    chip.onmouseout  = () => chip.style.opacity='1';
    chip.onmousedown = ev => {
      ev.preventDefault(); wrap.dataset.color = c;
      toolbar.querySelectorAll('[data-color-chip]').forEach(ch => ch.style.borderColor='transparent');
      chip.style.borderColor='#fff'; notify();
    };
    toolbar.appendChild(chip);
  });
  toolbar.appendChild(mkSep());
  toolbar.appendChild(mkTB('🗑', () => { row.remove(); notify(); }, 'Delete callout'));
  wrap.appendChild(toolbar);

  // ── Icon (emoji) ──────────────────────────────────────────────────────────
  const iconEl = document.createElement('div');
  iconEl.className = 'callout-icon';
  iconEl.textContent = icon || '💡';
  iconEl.title = 'Click to change icon';
  iconEl.addEventListener('click', e => {
    e.stopPropagation();
    const cid = row.dataset.calloutId || (row.dataset.calloutId = Math.random().toString(36).slice(2));
    if(window.bridge && window.bridge.trigger_callout_emoji)
      window.bridge.trigger_callout_emoji(cid);
  });
  wrap.appendChild(iconEl);

  // ── Children container — full nested blocks ───────────────────────────────
  const childrenDiv = document.createElement('div');
  childrenDiv.className = 'callout-children';

  // Focus inside callout → set _focusedContainer to childrenDiv
  childrenDiv.addEventListener('focusin', () => { _focusedContainer = childrenDiv; });

  // Populate children blocks (same as toggle body)
  const initBlocks = Array.isArray(children) && children.length ? children : [{t:'text',html:''}];
  loadContainer(childrenDiv, initBlocks);

  // "+ Add block" button
  const addBtn = document.createElement('div');
  addBtn.className = 'callout-add-btn';
  addBtn.textContent = '+ Add block';
  addBtn.addEventListener('click', () => {
    _focusedContainer = childrenDiv;
    const nr = addTextRow(childrenDiv, '', true);
    notify();
  });

  wrap.appendChild(childrenDiv);
  wrap.appendChild(addBtn);

  // ── Hover toolbar ─────────────────────────────────────────────────────────
  wrap.addEventListener('mouseenter', () => { barCancelHide(); toolbar.style.display = 'flex'; });
  wrap.addEventListener('mouseleave', () => barDelayHide(toolbar));
  toolbar.addEventListener('mouseenter', barCancelHide);
  toolbar.addEventListener('mouseleave', () => barDelayHide(toolbar));

  row.appendChild(wrap);
  container.appendChild(row);
  return row;
}

let _wikiMenu = null, _wikiBlock = null, _wikiSel = 0, _wikiStart = -1;
let _allNotes = [];  // populated from bridge

function openWiki(block, startOffset){
  closeWiki();
  _wikiBlock = block; _wikiSel = 0; _wikiStart = startOffset;
  // Ask Python for note list
  if(window.bridge && window.bridge.get_note_list){
    window.bridge.get_note_list((notes) => {
      _allNotes = JSON.parse(notes);
      renderWiki('');
    });
  } else {
    renderWiki('');
  }
}

function renderWiki(query){
  if(!_wikiBlock) return;
  const q = query.toLowerCase();
  const matches = q
    ? _allNotes.filter(n => n.title.toLowerCase().includes(q)).slice(0,12)
    : _allNotes.slice(0,12);

  // Create or reuse menu
  if(!_wikiMenu){
    _wikiMenu = document.createElement('div');
    _wikiMenu.className = 'wiki-menu';
    document.body.appendChild(_wikiMenu);
    // Position at caret
    const sel = window.getSelection();
    if(sel && sel.rangeCount){
      const r = sel.getRangeAt(0).getBoundingClientRect();
      let x = Math.min(r.left, window.innerWidth - 350);
      let y = r.bottom + 4;
      if(y + 280 > window.innerHeight) y = r.top - 284;
      _wikiMenu.style.left = x + 'px'; _wikiMenu.style.top = y + 'px';
    }
  }
  _wikiMenu.innerHTML = '';

  if(matches.length === 0){
    const empty = document.createElement('div');
    empty.className = 'wiki-empty';
    empty.textContent = query ? `No notes matching "${query}"` : 'No notes yet';
    _wikiMenu.appendChild(empty);
    return;
  }

  matches.forEach((note, idx) => {
    const el = document.createElement('div');
    el.className = 'wiki-item' + (idx === _wikiSel ? ' selected' : '');
    el.innerHTML = `<span class="wi-icon">📝</span><span class="wi-title">${note.title}</span>`;
    el.addEventListener('mousedown', e => { e.preventDefault(); insertWikiLink(note); });
    _wikiMenu.appendChild(el);
  });
}

function insertWikiLink(note){
  if(!_wikiBlock) return;
  const block = _wikiBlock;
  closeWiki();
  block.focus();

  // Use regex to remove [[ and everything typed after it (the query)
  // Works on innerHTML to handle any formatting inside the block
  block.innerHTML = block.innerHTML.replace(/\[\[[^\]<]*$/, '');

  // Move caret to end then insert the link
  placeCaretAtEnd(block);
  const linkHtml =
    `<a href="note://${note.id}" data-note-id="${note.id}" class="wiki-link" ` +
    `style="color:#4f8ef7;text-decoration:none;border-bottom:1px solid #4f8ef744">` +
    `[[${note.title}]]</a>&#8203;`;
  document.execCommand('insertHTML', false, linkHtml);
  notify();
}

// (getTextOffset/getNodeAtOffset removed — using regex approach)

function closeWiki(){
  if(_wikiMenu){ _wikiMenu.remove(); _wikiMenu = null; }
  _wikiBlock = null; _wikiSel = 0; _wikiStart = -1;
}

// Detect [[ in text blocks
document.addEventListener('input', e => {
  if(_slashMenu) return;  // slash takes priority
  const el = e.target;
  if(!el.classList.contains('block') && !el.classList.contains('tgl-title')) return;
  const sel = window.getSelection();
  if(!sel || !sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  const text = el.textContent;
  const curPos = range.startOffset;
  // Find [[ before cursor
  const before = (range.startContainer.nodeType === 3 ? range.startContainer.textContent : text).slice(0, range.startOffset);
  const fullBefore = text.slice(0, curPos > text.length ? text.length : curPos);
  const brackIdx = fullBefore.lastIndexOf('[[');
  if(brackIdx >= 0 && !fullBefore.slice(brackIdx).includes(']]')){
    const query = fullBefore.slice(brackIdx + 2);
    if(_wikiMenu){ renderWiki(query); }
    else { openWiki(el, brackIdx); setTimeout(()=>renderWiki(query), 50); }
  } else {
    closeWiki();
  }
}, true);

// Keyboard nav for wiki menu
document.addEventListener('keydown', e => {
  if(!_wikiMenu) return;
  const items = _wikiMenu.querySelectorAll('.wiki-item');
  if(e.key === 'ArrowDown'){ e.preventDefault(); _wikiSel = Math.min(_wikiSel+1, items.length-1);
    items.forEach((el,i) => el.classList.toggle('selected', i===_wikiSel)); return; }
  if(e.key === 'ArrowUp'){   e.preventDefault(); _wikiSel = Math.max(_wikiSel-1, 0);
    items.forEach((el,i) => el.classList.toggle('selected', i===_wikiSel)); return; }
  if(e.key === 'Enter' && _wikiMenu){ e.preventDefault();
    if(items[_wikiSel]) items[_wikiSel].dispatchEvent(new MouseEvent('mousedown')); return; }
  if(e.key === 'Escape'){ closeWiki(); return; }
}, true);

document.addEventListener('click', e => {

let _slashMenu = null, _slashBlock = null, _slashSel = 0, _slashQ = '';

function openSlash(block){
  closeSlash();
  _slashBlock = block; _slashQ = ''; _slashSel = 0;

  const menu = document.createElement('div');
  menu.className = 'slash-menu'; menu.id = '__slash__';
  _slashMenu = menu;

  renderSlash();

  // Position at caret
  const sel = window.getSelection();
  let x = 20, y = 40;
  if(sel && sel.rangeCount){
    const r = sel.getRangeAt(0).getBoundingClientRect();
    x = Math.min(r.left, window.innerWidth - 310);
    y = r.bottom + 4;
    if(y + 400 > window.innerHeight) y = r.top - 406;
  }
  menu.style.left = x + 'px'; menu.style.top = y + 'px';
  document.body.appendChild(menu);
  menu.querySelector('.slash-search').focus();
}

function renderSlash(){
  if(!_slashMenu) return;
  _slashMenu.innerHTML = '';
  const q = _slashQ.toLowerCase();
  const items = SLASH_CMDS.filter(c => {
    if(c.section||c.sep) return true;
    return !q || c.label.toLowerCase().includes(q) || (c.key||'').includes(q);
  });

  // Remove orphaned sections/seps
  const filtered = [];
  for(let i=0;i<items.length;i++){
    const item=items[i];
    if(item.section){
      const next=items.slice(i+1).find(x=>!x.section&&!x.sep);
      if(!next) continue;
      const nextInFilter = SLASH_CMDS.filter(c=>!c.section&&!c.sep&&(!q||c.label.toLowerCase().includes(q)||(c.key||'').includes(q)));
      // Only show section if it has children matching
      const secIdx = SLASH_CMDS.indexOf(item);
      const hasChild = nextInFilter.some(c=>{
        const ci=SLASH_CMDS.indexOf(c);
        const prevSec=SLASH_CMDS.slice(0,ci).reverse().find(x=>x.section);
        return prevSec===item;
      });
      if(hasChild||!q) filtered.push(item);
    } else {
      filtered.push(item);
    }
  }

  const inp = document.createElement('input');
  inp.className='slash-search'; inp.placeholder='/Type to search…'; inp.value=_slashQ;
  inp.addEventListener('input', e=>{ _slashQ=e.target.value; _slashSel=0; renderSlash(); });
  inp.addEventListener('keydown', slashKeydown);
  _slashMenu.appendChild(inp);

  let cmdIdx = 0;
  const cmds = [];
  filtered.forEach(item=>{
    if(item.sep){ const s=document.createElement('div');s.className='slash-sep';_slashMenu.appendChild(s); return; }
    if(item.section){ const s=document.createElement('div');s.className='slash-section';s.textContent=item.section;_slashMenu.appendChild(s); return; }
    const el=document.createElement('div');el.className='slash-item'+(cmdIdx===_slashSel?' selected':'');
    el.innerHTML=`<div class="slash-icon">${item.icon}</div><div><div class="slash-label">${item.label}</div></div>${item.hint?`<div class="slash-hint">${item.hint}</div>`:''}`;
    const fn=item.fn;
    el.addEventListener('mousedown', e=>{ e.preventDefault(); fn(); });
    _slashMenu.appendChild(el);
    cmds.push(el);
    cmdIdx++;
  });
  if(cmds.length===0){
    const empty=document.createElement('div');empty.style.cssText='color:#4a5068;padding:12px;font-size:12px;text-align:center';
    empty.textContent='No matching commands'; _slashMenu.appendChild(empty);
  }
  setTimeout(()=>inp.focus(),0);
}

function slashKeydown(e){
  const items = _slashMenu ? _slashMenu.querySelectorAll('.slash-item') : [];
  if(e.key==='ArrowDown'){ e.preventDefault(); _slashSel=Math.min(_slashSel+1,items.length-1); renderSlash(); return; }
  if(e.key==='ArrowUp'){   e.preventDefault(); _slashSel=Math.max(_slashSel-1,0); renderSlash(); return; }
  if(e.key==='Enter'){ e.preventDefault(); if(items[_slashSel]) items[_slashSel].dispatchEvent(new MouseEvent('mousedown')); return; }
  if(e.key==='Escape'){ e.preventDefault(); closeSlash(); if(_slashBlock) _slashBlock.focus(); return; }
}

function closeSlash(){
  if(_slashMenu){ _slashMenu.remove(); _slashMenu=null; }
  _slashBlock=null; _slashSel=0;
}

// Replace current block text (clears the "/" prefix) then run action
function focusAndClear(){
  if(!_slashBlock) return;
  _slashBlock.focus();
  // Clear all content directly (avoids Range.setStart on div error)
  _slashBlock.innerHTML = '';
  _slashBlock.focus();
}

function setBlockType(type){
  const b = _slashBlock;
  focusAndClear();
  closeSlash();
  if(!b) return;
  b.dataset.blkType = (type === 'text' ? '' : type);
  b.focus();
  placeCaretAtEnd(b);
  if(type === 'numbered'){
    const rows = (b.closest('.tgl-body')||root).querySelectorAll('.blk-row');
    let n=1;
    rows.forEach(r=>{ const blk=r.querySelector('.block'); if(blk&&blk.dataset.blkType==='numbered') blk.dataset.num=String(n++); });
  }
  notify();
}

function replaceSlashBlock(fn){
  const slashRow  = _slashBlock ? _slashBlock.closest('.blk-row') : null;
  const origNext  = slashRow?.nextElementSibling ?? null;
  let   replacing = false;   // true → slash block was empty, new block takes its place

  if(_slashBlock){
    const fullText  = _slashBlock.textContent || '';
    const slashIdx  = fullText.lastIndexOf('/');
    const beforeTxt = slashIdx > 0 ? fullText.slice(0, slashIdx).trimEnd() : '';

    if(beforeTxt.length === 0){
      // Block only had "/" (+ optional query) → replace it with new block type
      replacing = true;
      _slashBlock.textContent = '';
    } else {
      // Block had content BEFORE "/" → keep that content, insert new block below
      replacing = false;
      _slashBlock.textContent = beforeTxt;   // strip "/" and query, preserve earlier text
    }
    _lastFocusedRow   = slashRow;
    _focusedContainer = slashRow?.parentElement || root;
  }

  closeSlash();
  fn();   // inserts new block right AFTER slashRow (via _lastFocusedRow.after)

  if(slashRow && slashRow.isConnected){
    const newBlock       = slashRow.nextElementSibling;
    const newWasInserted = newBlock && newBlock !== origNext;

    if(replacing && newWasInserted){
      // Slash block was empty → move new block to slash's exact position, remove remnant
      slashRow.before(newBlock);
      slashRow.remove();
    }
    // If !replacing → new block stays AFTER slash row (which still has preserved text) ✓
    // If fn() inserted nothing (dialog cancelled) → slash row keeps its preserved text ✓
  }
}

// Detect "/" on input in any editable block
document.addEventListener('input', e => {
  const el = e.target;
  if(!el.classList.contains('block')&&!el.classList.contains('tgl-title')) return;
  const text = el.textContent;
  const sel = window.getSelection();
  if(!sel||!sel.rangeCount) return;
  const offset = sel.getRangeAt(0).startOffset;
  // Show when "/" is the last char typed and it's at start or after whitespace
  const before = text.slice(0, offset);
  if(before.endsWith('/') && (before.length===1||/\s$/.test(before.slice(0,-1)))){
    openSlash(el);
  } else if(_slashMenu){
    // Update query as user types after "/"
    const slashPos = before.lastIndexOf('/');
    if(slashPos>=0){ _slashQ=before.slice(slashPos+1); renderSlash(); }
    else closeSlash();
  }
});

document.addEventListener('click', e => {
  if(_slashMenu && !_slashMenu.contains(e.target)) closeSlash();
});
document.addEventListener('keydown', e => {
  if(e.key==='Escape' && _slashMenu){ closeSlash(); }
}, true);

const editorCmd = window.editorCmd = {
  undo(){
    if(_histIdx <= 0) return;
    // Block MutationObserver from soft-deleting files for the full undo+restore window.
    // Without this, request_image_data arrives before restore_trash completes,
    // sees the file as missing, replaces img with a broken placeholder,
    // which triggers another soft_delete — undoing the restore.
    _undoInProgress = true;
    _histIdx--; _undoing=true;
    loadContainer(root, JSON.parse(_history[_histIdx]).blocks);
    notify();
    _undoing=false;
    // Restore any files that were soft-deleted and are now back in the DOM
    setTimeout(() => {
      const paths = [];
      document.querySelectorAll('img[data-local]').forEach(img => {
        if(img.dataset.local) paths.push(img.dataset.local);
      });
      document.querySelectorAll('[data-pdf-rel]').forEach(el => {
        if(el.dataset.pdfRel) paths.push(el.dataset.pdfRel);
      });
      // Call once per path — @Slot(str) instead of QVariantList for QWebChannel compatibility
      if(paths.length && window.bridge && window.bridge.restore_trash_path)
        paths.forEach(p => window.bridge.restore_trash_path(p));
      // Keep blocking for another 800ms so request_image_data callback
      // (which arrives ~50-300ms after QWebChannel round-trip) doesn't
      // trigger a replacement that re-deletes the just-restored file.
      setTimeout(() => {
        _undoInProgress = false;
        // Re-load any images that were waiting for restore (src still empty)
        document.querySelectorAll('img[data-local]').forEach(img => {

  applyTheme(t){ try{ const th=typeof t==='string'?JSON.parse(t):t; if(!th) return; Object.entries({bg:th.bg,fg:th.fg,ph:th.ph,sel:th.sel,mid:th.mid,alt:th.alt}).forEach(([k,v])=>{ if(v) document.documentElement.style.setProperty('--'+k,v); }); if(th.bg) document.body.style.background=th.bg; }catch(e){} },
  bold(){ document.execCommand('bold'); notify(); },

  _setAlign(val){
    // Collect all block-level elements to align
    const targets = new Set();
    const sel = window.getSelection();

    // From text selection
    if(sel && sel.rangeCount) {
      const range = sel.getRangeAt(0);
      // Walk from start to end collecting parent block elements
      [range.startContainer, range.endContainer].forEach(node=>{
        let el = node.nodeType===3 ? node.parentNode : node;
        while(el && el!==document.body){
          if(el.classList && (el.classList.contains('block') || el.classList.contains('tgl-title') || el.tagName==='TD')){
            targets.add(el);
            _lastAlignTarget = el;  // remember this
            break;
          }
          el = el.parentNode;
        }
      });
    }

    // From multi-block selection
    document.querySelectorAll('.blk-row.multi-sel').forEach(row=>{
      const b = row.querySelector('.block,.tgl-title');
      if(b) targets.add(b);
    });

    // Fallback 1: use currently focused element
    if(targets.size === 0) {
      const active = document.activeElement;
      if(active && (active.classList.contains('block') || active.classList.contains('tgl-title') || active.tagName === 'TD')){
        targets.add(active);
      }
    }
    // Fallback 2: use last known focused block (handles case where toolbar click steals focus)
    if(targets.size === 0 && _lastAlignTarget && document.body.contains(_lastAlignTarget)){
      targets.add(_lastAlignTarget);
      if(window.bridge) window.bridge.log('[J] fallback2 used, targets.size now=' + targets.size);
    }

    if(targets.size > 0){
      targets.forEach(el => {
            el.style.textAlign = val;
        // For justify: white-space:pre-wrap blocks it — switch to pre-line
        if(val === 'justify'){
          el.style.whiteSpace = 'pre-line';
          el.style.textAlignLast = 'left';
        } else {
          el.style.whiteSpace = 'pre-wrap';
          el.style.textAlignLast = '';
        }
        // Also apply to all direct child paragraphs/divs if any
        el.querySelectorAll('p,div').forEach(child => {
          child.style.textAlign = val;
        });
      });
      notify();
      return;
    }

    if(window.bridge) window.bridge.log('[Justify] FALLBACK to execCommand, targets was empty');
    // Last resort: execCommand
    const cmds={left:'justifyLeft',center:'justifyCenter',right:'justifyRight',justify:'justifyFull'};
    document.execCommand(cmds[val] || 'justifyLeft');
    notify();
  },

  _copiedStyle: null, _painterActive: false,

  // ── Copy Format (like Word Format Painter) ────────────────────────────────
  copyFormat(){
    const sel=window.getSelection();
    let node=document.activeElement;
    if(sel&&sel.rangeCount>0){
      let n=sel.getRangeAt(0).startContainer;
      node=n.nodeType===3?n.parentNode:n;
    }
    // Walk up to find styled span/b/i/u element
    let styled=node;
    let cur=node;
    while(cur&&cur!==document.body){
      if(['SPAN','B','I','U','STRONG','EM','FONT'].includes(cur.tagName||'')){styled=cur;break;}
      cur=cur.parentNode;
    }
    const st=window.getComputedStyle(styled);
    // Capture all relevant format properties
    this._copiedStyle={
      fw:  st.fontWeight,
      fs:  st.fontStyle,
      td:  st.textDecoration,
      c:   st.color,
      bg:  st.backgroundColor==='rgba(0, 0, 0, 0)'?'':st.backgroundColor,
      ff:  st.fontFamily,
      fz:  st.fontSize,
      ta:  (styled.style&&styled.style.textAlign)||'',
    };
    this._painterActive=true;
    document.body.style.cursor='cell';
    // Show visual indicator
    document.querySelectorAll('.block,.tgl-title').forEach(el=>{
      el.style.outline='1px dashed #4f8ef766';
    });
  },

  // Apply copied format to current selection (called on mouseup when painter active)
  pasteFormat(){
    if(!this._copiedStyle) return;
    const f=this._copiedStyle;
    document.execCommand('styleWithCSS',false,true);
    // Build a CSS string and wrap selection in a span
    const styles=[];
    if(f.fw==='bold'||parseInt(f.fw)>=700) document.execCommand('bold',false,null);
    if(f.fs==='italic') document.execCommand('italic',false,null);
    if((f.td||'').includes('underline')) document.execCommand('underline',false,null);
    if(f.c) document.execCommand('foreColor',false,f.c);
    if(f.bg) document.execCommand('hiliteColor',false,f.bg);
    if(f.ff){ editorCmd._setFontFamily(f.ff.replace(/['"]/g,'')); }
    if(f.fz){
      const px=parseFloat(f.fz);
      const pt=Math.round(px*0.75);
      if(pt>0) editorCmd.setFontSize(pt+'pt');
    }
    // Apply text alignment
    if(f.ta){ editorCmd._setAlign(f.ta); }
    // Cancel painter after one apply (like Word single-click)
    this._painterActive=false;
    document.body.style.cursor='';
    document.querySelectorAll('.block,.tgl-title').forEach(el=>{el.style.outline='';});
    if(window.bridge&&window.bridge.on_painter_done) window.bridge.on_painter_done();
    notify();
  },

  // ── Clear Format (like Word Clear All Formatting) ─────────────────────────
  clearFmt(){
    // Remove all inline formatting from selection
    document.execCommand('removeFormat');
    // Also remove inline styles from all elements within selection
    const sel=window.getSelection();
    if(sel&&sel.rangeCount){
      const range=sel.getRangeAt(0);
      const frag=range.cloneContents();
      // Remove style attributes from cloned content
      frag.querySelectorAll('[style],[class]').forEach(el=>{
        el.removeAttribute('style');
        // Keep structural classes, remove format classes
        const keep=['block','tgl-title','blk-row'];
        if(!keep.some(c=>el.classList.contains(c))) el.removeAttribute('class');
      });
      // Also reset text alignment on parent block
      const n=sel.anchorNode;
      const blk=n?(n.nodeType===3?n.parentNode:n):null;
      const target=blk?blk.closest('.block,.tgl-title,td'):null;
      if(target){
        target.style.textAlign='';
        target.style.fontSize='';
        target.style.fontFamily='';
        target.style.fontWeight='';
        target.style.fontStyle='';
        target.style.textDecoration='';
        target.style.color='';
        target.style.backgroundColor='';
      }
    }
    notify();
  },

  cancelFormatPainter(){
    this._painterActive=false;
    document.body.style.cursor='';
    document.querySelectorAll('.block,.tgl-title').forEach(el=>{el.style.outline='';});
  },

  /** Called by Python _do_save() to get fresh content synchronously.
   *  Unlike on_change (debounced 300ms), this always returns current DOM state. */
  getContent(){ return serialize(); },
};  // ← end of editorCmd

// ── Tag-name Highlighter ──────────────────────────────────────────────────────
// Scans every text block for occurrences of any tag NAME (e.g. "rèn luyện tư duy")
// and wraps them in a coloured underlined <span class="tag-link">.
// No special syntax needed — the tag name itself acts as the keyword.
// ══════════════════════════════════════════════════════════════════════════════

let _tagsMap = {};   // { 'tên tag': { id, name, color } }
let _tagRegex = null; // combined regex rebuilt whenever _tagsMap changes

/** Escape a string for use inside a RegExp. */
function _reEscape(s){ return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

/** Rebuild the combined tag-name regex from _tagsMap keys.
 *  Requires literal '#' before the tag name AND '#' must NOT be preceded
 *  by URL chars (/ ? = & # . or \w) — mirrors Python TAG_PATTERN rules.
 */
function _buildTagRegex(){
  const names = Object.keys(_tagsMap);
  if(!names.length){ _tagRegex = null; return; }
  // Sort longest-first so "machine-learning" matches before "machine"
  const parts = names
    .slice().sort((a,b) => b.length - a.length)
    .map(_reEscape);
  // Negative lookbehind: # not inside URL fragment; positive: literal # before name
  // Negative lookahead: tag name not followed by more word chars (exact match)
  _tagRegex = new RegExp(
    '(?<![/\\w?=&#.])#(' + parts.join('|') + ')(?![a-zA-Z0-9_\\-])',
    'gi'
  );
}

/** Fetch all tags from Python, populate _tagsMap, rebuild regex, re-render. */
function _loadTagsMap(){
  if(!window.bridge || !window.bridge.get_tags_json) return;
  window.bridge.get_tags_json(json => {
    try{
      const tags = JSON.parse(json);
      _tagsMap = {};
      tags.forEach(t => {
        if(t.name && t.name.trim())
          _tagsMap[t.name.toLowerCase()] = {id: t.id, name: t.name, color: t.color || '#4f8ef7'};
      });
      _buildTagRegex();
      renderTagLinks(root);   // highlight current note
    }catch(e){ console.error('[tag-hl] _loadTagsMap error:', e); }
  });
}

/** Apply/refresh colors on already-rendered spans (fast path after color change). */
function _applyTagChipColors(){
  document.querySelectorAll('.tag-link[data-tag-name]').forEach(span => {
    const info = _tagsMap[span.dataset.tagName];
    if(info){ span.style.color = info.color; span.style.textDecorationColor = info.color; }
  });
}

/** Create a styled <span class="tag-link"> for a matched tag name. */
function createTagChip(matchedText){
  const key  = matchedText.toLowerCase();
  const info = _tagsMap[key];
  const color = info ? info.color : '#4f8ef7';
  const span  = document.createElement('span');
  span.className       = 'tag-link';
  span.contentEditable = 'false';
  span.dataset.tagName = key;
  span.textContent     = '#' + matchedText;   // always show # prefix
  span.style.color     = color;
  span.style.textDecorationColor = color;
  return span;
}

// ── Render tag-name links inside a container ──────────────────────────────────
function renderTagLinks(container){
  if(!container || !_tagRegex) return;
  container.querySelectorAll('.block,.tgl-title,.task-text').forEach(_renderTagLinksInEl);
}

function _renderTagLinksInEl(el){
  if(!_tagRegex) return;
  const raw = el.innerHTML;

  // Use a detached div so we can walk text nodes without live-DOM side-effects.
  const tmp = document.createElement('div');
  tmp.innerHTML = raw;

  let changed = false;
  _tagRegex.lastIndex = 0;

  (function walk(node){
    if(node.nodeType === Node.ELEMENT_NODE){
      // Skip nodes already styled as a tag-link
      if(node.dataset && node.dataset.tagName !== undefined) return;
      Array.from(node.childNodes).forEach(walk);
    } else if(node.nodeType === Node.TEXT_NODE){
      const text = node.textContent;
      if(!text.trim()) return;
      _tagRegex.lastIndex = 0;
      if(!_tagRegex.test(text)) return;
      _tagRegex.lastIndex = 0;

      const frag = document.createDocumentFragment();
      let last = 0, m;
      while((m = _tagRegex.exec(text))){
        // m.index points to '#'; m[1] is the tag name (after '#')
        // Include text up to and including any chars before '#'
        if(m.index > last)
          frag.appendChild(document.createTextNode(text.slice(last, m.index)));
        // Skip the '#' char (m.index) — chip will render "#tagname" visually
        frag.appendChild(createTagChip(m[1]));
        last = _tagRegex.lastIndex;
      }
      if(last < text.length)
        frag.appendChild(document.createTextNode(text.slice(last)));
      node.parentNode.replaceChild(frag, node);
      changed = true;
    }
  })(tmp);

  if(changed) el.innerHTML = tmp.innerHTML;
}

// ── Click on tag-link → open Galaxy focused on that tag ──────────────────────
root.addEventListener('click', e => {
  const link = tgt(e).closest('.tag-link');
  if(!link) return;
  e.preventDefault();
  e.stopPropagation();
  const name = link.dataset.tagName;
  if(name && window.bridge && window.bridge.open_tag_in_galaxy)
    window.bridge.open_tag_in_galaxy(name);
}, true);

// ── Python pushes refreshed tag map (after tag create / update / delete) ──────
editorCmd.setTagsMap = function(json){
  try{
    const tags = JSON.parse(json);
    _tagsMap = {};
    tags.forEach(t => {
      if(t.name && t.name.trim())
        _tagsMap[t.name.toLowerCase()] = {id: t.id, name: t.name, color: t.color || '#4f8ef7'};
    });
    _buildTagRegex();
    _applyTagChipColors();
    renderTagLinks(root);  // re-highlight with new/updated tags
  }catch(e){ console.error('[tag-hl] setTagsMap error:', e); }
};

// ── Smart URL Paste → Auto Embed (Notion-style) ───────────────────────────────
// When user pastes a bare URL that can be embedded, show an inline popup:
//   "Nhúng link này?  [✅ Nhúng]  [🔗 Giữ text]  [✕]"
// ══════════════════════════════════════════════════════════════════════════════

/** Convert a pasted URL to an embed src (iframe-friendly).
 *  Returns null if the URL is not embeddable. */
function _urlToEmbedSrc(url) {
  url = url.trim();
  try {
    const u = new URL(url);
    const host = u.hostname.replace(/^www\./, '');

    // ── YouTube ───────────────────────────────────────────────────────────────
    // youtube.com/watch?v=ID  or  youtu.be/ID
    if(host === 'youtube.com' || host === 'youtu.be'){
      let vid = u.searchParams.get('v') ||
                (host === 'youtu.be' ? u.pathname.slice(1) : null);
      if(!vid){
        // /shorts/ID  or  /embed/ID
        const m = u.pathname.match(/\/(shorts|embed|v)\/([^/?&]+)/);
        if(m) vid = m[2];
      }
      if(vid) return `https://www.youtube.com/embed/${vid}`;
    }

    // ── Vimeo ─────────────────────────────────────────────────────────────────
    if(host === 'vimeo.com'){
      const m = u.pathname.match(/\/(\d+)/);
      if(m) return `https://player.vimeo.com/video/${m[1]}`;
    }

    // ── Google Docs / Sheets / Slides ─────────────────────────────────────────
    if(host === 'docs.google.com'){
      // Already an embed URL → use as-is
      if(u.pathname.includes('/preview') || u.pathname.includes('/embed'))
        return url;
      // /document/d/ID/edit  → /document/d/ID/preview
      const m = u.pathname.match(/\/(document|spreadsheets|presentation|forms)\/d\/([^/]+)/);
      if(m){
        const type = m[1];
        const id   = m[2];
        if(type === 'spreadsheets')
          return `https://docs.google.com/spreadsheets/d/${id}/preview`;
        if(type === 'presentation')
          return `https://docs.google.com/presentation/d/${id}/preview`;
        if(type === 'forms')
          return `https://docs.google.com/forms/d/${id}/viewform?embedded=true`;
        return `https://docs.google.com/document/d/${id}/preview`;
      }
    }

    // ── Google Drive ──────────────────────────────────────────────────────────
    if(host === 'drive.google.com'){
      const m = u.pathname.match(/\/file\/d\/([^/]+)/);
      if(m) return `https://drive.google.com/file/d/${m[1]}/preview`;
    }

    // ── Google Maps ───────────────────────────────────────────────────────────
    if(host === 'google.com' && u.pathname.startsWith('/maps')){
      // Convert share URL to embed
      return `https://maps.google.com/maps?q=${encodeURIComponent(url)}&output=embed`;
    }

    // ── Figma ─────────────────────────────────────────────────────────────────
    if(host === 'figma.com'){
      return `https://www.figma.com/embed?embed_host=galaxynote&url=${encodeURIComponent(url)}`;
    }

    // ── Generic: only if the URL looks like it could be an iframe-friendly page
    // (has no extension, or is .html/.htm)
    const ext = u.pathname.split('.').pop().toLowerCase();
    if(['html','htm','php','aspx','jsp',''].includes(ext)){
      return url;  // embed as-is
    }
  } catch(_) {}
  return null;  // not embeddable
}

/** Show inline popup below the pasted text row.
 *  Dismisses automatically after 5s or on user action. */
function _showEmbedPopup(textRow, rawUrl, embedSrc, container) {
  // Remove any existing popup
  document.querySelectorAll('._embed-popup').forEach(el => el.remove());

  const pop = document.createElement('div');
  pop.className = '_embed-popup';
  pop.style.cssText =
    'display:flex;align-items:center;gap:8px;padding:8px 12px;margin:2px 0;'
    + 'background:#101828;border:1px solid #2a4070;border-radius:8px;'
    + 'font-size:12px;color:#c4cad8;animation:fadeIn .15s ease;';

  const icon = document.createElement('span');
  icon.textContent = '🔗'; icon.style.fontSize = '16px';

  const msg = document.createElement('span');
  msg.textContent = 'Nhúng link này vào note?';
  msg.style.flex = '1';

  const mkPop = (label, color, fn) => {
    const b = document.createElement('button');
    b.textContent = label;
    b.style.cssText =
      `background:${color};border:none;border-radius:5px;padding:4px 10px;`
      + 'color:#fff;font-size:11px;font-weight:600;cursor:pointer;';
    b.onclick = () => { clearTimeout(timer); pop.remove(); fn(); };
    return b;
  };

  const btnEmbed = mkPop('✅ Nhúng', '#1a4a90', () => {
    const ihtml = `<iframe src="${embedSrc}" width="100%" height="400" frameborder="0" allowfullscreen></iframe>`;
    const targetContainer = container || textRow.parentElement || root;
    const blk = textRow.querySelector('.block');
    const isOnlyUrl = blk && blk.textContent.trim() === rawUrl;

    _focusedContainer = targetContainer;
    _lastFocusedRow   = textRow;

    const embedRow = editorCmd.insertEmbed(ihtml);

    // insertEmbed now places row via target.after(), so embedRow is already
    // in the correct container. Just clean up the URL text row if needed.
    if(embedRow && isOnlyUrl && textRow.isConnected){
      textRow.remove();
    }
    notify();
  });

  const btnKeep = mkPop('🔗 Giữ text', '#2a3354', () => { /* do nothing, keep plain text */ });

  const btnX = document.createElement('button');
  btnX.textContent = '✕';
  btnX.style.cssText = 'background:none;border:none;color:#4a5068;font-size:14px;cursor:pointer;padding:0 2px;';
  btnX.onclick = () => { clearTimeout(timer); pop.remove(); };

  // Progress bar for auto-dismiss
  const bar = document.createElement('div');
  bar.style.cssText =
    'position:absolute;bottom:0;left:0;height:2px;background:#1a4a90;'
    + 'border-radius:0 0 8px 8px;width:100%;transition:width 5s linear;';
  pop.style.position = 'relative';

  pop.append(icon, msg, btnEmbed, btnKeep, btnX, bar);
  textRow.after(pop);

  // Start progress bar animation
  requestAnimationFrame(() => { bar.style.width = '0%'; });

  // Auto dismiss after 5 seconds
  const timer = setTimeout(() => pop.remove(), 5000);
}
editorCmd.findText = function(query, caseSensitive){
  editorCmd.clearFind();
  if(!query||!query.trim()) return 0;
  const cs = caseSensitive || editorCmd._findCaseSensitive || false;
  const q = cs ? query : query.toLowerCase();
  const skipTags = new Set(['SCRIPT','STYLE','NOSCRIPT','MARK']);
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode: n => {
      let p = n.parentElement;
      while(p && p !== root){
        if(skipTags.has(p.tagName)) return NodeFilter.FILTER_REJECT;
        if(p.classList.contains('drag-handle')) return NodeFilter.FILTER_REJECT;
        p = p.parentElement;
      }
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const matches = [];
  let node;
  while((node = walker.nextNode())){
    const txt = node.textContent;
    const lo = cs ? txt : txt.toLowerCase();
    let i = 0;
    while((i = lo.indexOf(q, i)) !== -1){ matches.push({node, start:i, end:i+q.length}); i += q.length; }
  }
  // Wrap in reverse order to preserve string offsets
  for(let i = matches.length - 1; i >= 0; i--){
    try{
      const {node, start, end} = matches[i];
      const range = document.createRange();
      range.setStart(node, start); range.setEnd(node, end);
      const mark = document.createElement('mark');
      mark.className = 'gn-find';
      range.surroundContents(mark);
    }catch(e){}
  }
  _findIdx = 0;
  editorCmd._updateFindActive();
  return document.querySelectorAll('.gn-find').length;
};
editorCmd.findNext = function(){
  const marks = document.querySelectorAll('.gn-find');
  if(!marks.length) return;
  _findIdx = (_findIdx + 1) % marks.length;
  editorCmd._updateFindActive();
};
editorCmd.findPrev = function(){
  const marks = document.querySelectorAll('.gn-find');
  if(!marks.length) return;
  _findIdx = (_findIdx - 1 + marks.length) % marks.length;
  editorCmd._updateFindActive();
};
editorCmd.clearFind = function(){
  document.querySelectorAll('.gn-find').forEach(m => {
    const p = m.parentNode; if(!p) return;
    while(m.firstChild) p.insertBefore(m.firstChild, m);
    p.removeChild(m);
    try{ p.normalize(); }catch(e){}
  });
  _findIdx = 0;
};
editorCmd._updateFindActive = function(){
  const marks = document.querySelectorAll('.gn-find');
  marks.forEach((m, i) => m.classList.toggle('gn-find-active', i === _findIdx));
  if(marks[_findIdx]) marks[_findIdx].scrollIntoView({behavior:'smooth', block:'center'});
  if(window.bridge && window.bridge.on_find_result){
    try{ window.bridge.on_find_result(_findIdx + 1, marks.length); }catch(e){}
  }
};


// ── Helper: read <pre contenteditable> content preserving newlines ──────────
// Chromium wraps lines into <div>/<br> when user types Enter in contenteditable.
// This helper converts that DOM structure back to plain text with real \n.
function _getPreText(pre){
  function walk(node, buf){
    if(node.nodeType===3){          // text node
      buf.push(node.textContent);
    } else if(node.nodeName==='BR'){
      buf.push('\n');
    } else if(node.nodeName==='DIV'||node.nodeName==='P'){
      // Block-level wrapper inserted by Chromium contenteditable
      if(buf.length && buf[buf.length-1]!=='\n') buf.push('\n');
      for(const ch of node.childNodes) walk(ch, buf);
      if(buf.length && buf[buf.length-1]!=='\n') buf.push('\n');
    } else {
      for(const ch of node.childNodes) walk(ch, buf);
    }
  }
  const buf=[];
  for(const ch of pre.childNodes) walk(ch, buf);
  // Trim single trailing \n that Chromium always adds
  let txt = buf.join('');
  if(txt.endsWith('\n')) txt = txt.slice(0,-1);
  return txt;
}

function addCodeRow(container, code, align, w, bg){
  const row = document.createElement('div'); row.className='blk-row';
  if(bg) row.classList.add(bg);
  row.appendChild(makeDragHandle());

  const outer = document.createElement('div');
  outer.className='code-outer'; outer.dataset.codeAlign=align||'left';
  outer.style.cssText='flex:1;position:relative;overflow:visible;';

  // ── Create <pre> FIRST so all bar buttons can reference it ───────────────
  const pre=document.createElement('pre');
  pre.className='code-block';
  pre.contentEditable=_ro?'false':'true';
  pre.style.cssText='background:#0a0e1a;color:#c8d8f0;border:1px solid #2a3354;' +
    'border-radius:8px;padding:14px 16px;font-family:monospace;font-size:13px;' +
    'line-height:1.6;white-space:pre;overflow-x:auto;outline:none;word-break:normal;' +
    '-webkit-user-modify:read-write-plaintext-only;' +
    'width:'+(w||'100%')+';box-sizing:border-box;display:block;';
  if(code) pre.textContent=code;
  else{ pre.setAttribute('data-ph','// Code here…'); }

  // Floating bar (built after pre so closures work correctly)
  const bar = document.createElement('div');
  bar.style.cssText='position:absolute;top:-34px;left:50%;transform:translateX(-50%);' +
    'background:#10182a;border:1px solid #2a3354;border-radius:8px;' +
    'padding:4px 8px;display:none;gap:4px;white-space:nowrap;z-index:20;' +
    'box-shadow:0 4px 16px rgba(0,0,0,.5);align-items:center;';

  const mkB=(t,fn)=>{
    const b=document.createElement('button');
    b.textContent=t; b.style.cssText='background:transparent;border:none;color:#e8edf8;font-size:11px;cursor:pointer;padding:3px 8px;border-radius:5px;';
    b.onmouseover=()=>b.style.background='#2a3354'; b.onmouseout=()=>b.style.background='transparent';
    b.onmousedown=e=>{e.preventDefault();fn();};
    return b;
  };

  // Width presets
  ['25%','50%','75%','100%'].forEach(ww=>{
    bar.appendChild(mkB(ww,()=>{pre.style.width=ww;outer.dataset.codeW=ww;notify();}));
  });
  const sep=document.createElement('div');sep.style.cssText='width:1px;background:#2a3354;margin:2px 4px;';bar.appendChild(sep);

  // Wrap toggle — save & restore selection so cursor doesn't jump
  let _wrapped = (outer.dataset.codeWrap === '1');
  const wrapBtn = mkB('↵ Wrap', () => {
    // 1. Snapshot current selection
    const sel = window.getSelection();
    let savedRange = null;
    if(sel && sel.rangeCount > 0) savedRange = sel.getRangeAt(0).cloneRange();

    // 2. Toggle wrap
    _wrapped = !_wrapped;
    pre.style.whiteSpace   = _wrapped ? 'pre-wrap' : 'pre';
    pre.style.overflowX    = _wrapped ? 'hidden'   : 'auto';
    pre.style.wordBreak    = _wrapped ? 'break-all' : 'normal';
    outer.dataset.codeWrap = _wrapped ? '1' : '';
    wrapBtn.style.color    = _wrapped ? '#4ec994' : '#e8edf8';

    // 3. Restore selection after browser reflows
    requestAnimationFrame(() => {
      if(savedRange && sel){
        try{ sel.removeAllRanges(); sel.addRange(savedRange); }catch(_){}
      }
      notify();
    });
  });
  bar.appendChild(wrapBtn);
  const sepWrap=document.createElement('div');sepWrap.style.cssText='width:1px;background:#2a3354;margin:2px 4px;';bar.appendChild(sepWrap);

  // ── Copy button ───────────────────────────────────────────────────────────
  const copyBtn = mkB('📋 Copy', () => {
    // pre is defined later in this same function scope — closure captures it
    // correctly since onclick fires after addCodeRow() fully completes.
    const code = _getPreText(pre);

    const _showOk = () => {
      copyBtn.textContent = '✅ Copied!';
      copyBtn.style.color = '#4ec994';
      setTimeout(() => { copyBtn.textContent = '📋 Copy'; copyBtn.style.color = ''; }, 1800);
    };
    const _showFail = () => {
      copyBtn.textContent = '❌ Failed';
      copyBtn.style.color = '#e05c6a';
      setTimeout(() => { copyBtn.textContent = '📋 Copy'; copyBtn.style.color = ''; }, 1800);
    };

    // Primary: textarea + execCommand — works in QWebEngine without HTTPS
    try {
      const ta = document.createElement('textarea');
      ta.value = code;
      ta.style.cssText = 'position:fixed;left:-9999px;top:0;opacity:0;';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      if(ok){ _showOk(); return; }
    } catch(_){}

    // Fallback: modern Clipboard API (needs secure context)
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(code).then(_showOk).catch(_showFail);
    } else {
      _showFail();
    }
  });
  bar.appendChild(copyBtn);
  const sep3=sep.cloneNode();bar.appendChild(sep3);

  // Align
  [['◀','left'],['■','center'],['▶','right']].forEach(([l,a])=>{
    bar.appendChild(mkB(l,()=>{
      outer.dataset.codeAlign=a;
      if(a==='center'){pre.style.marginLeft='auto';pre.style.marginRight='auto';}
      else if(a==='right'){pre.style.marginLeft='auto';pre.style.marginRight='0';}
      else{pre.style.marginLeft='0';pre.style.marginRight='0';}
      notify();
    }));
  });
  const sep2=sep.cloneNode();bar.appendChild(sep2);
  bar.appendChild(mkB('🗑',()=>{row.remove();notify();}));

  // Restore wrap state (pre already created above, just apply styles)
  if(outer.dataset.codeWrap === '1'){
    pre.style.whiteSpace = 'pre-wrap';
    pre.style.overflowX  = 'hidden';
    pre.style.wordBreak  = 'break-all';
    wrapBtn.style.color  = '#4ec994';
  }
  attachPh(pre);
  pre.addEventListener('input',notifyDebounced);
  pre.addEventListener('focus',()=>{_lastFocusedRow=row;_focusedContainer=_findNested(pre);});
  pre.addEventListener('keydown',e=>{
    if(e.key==='Tab'){
      e.preventDefault();
      // Use Selection API (execCommand deprecated in newer Chromium)
      const sel=window.getSelection();
      if(sel&&sel.rangeCount){
        const r=sel.getRangeAt(0); r.deleteContents();
        r.insertNode(document.createTextNode('    '));
        r.collapse(false); sel.removeAllRanges(); sel.addRange(r);
        notifyDebounced();
      }
    }
    if(e.key==='Enter'&&!e.shiftKey){
      e.preventDefault();
      const sel=window.getSelection();
      if(sel&&sel.rangeCount){
        const r=sel.getRangeAt(0); r.deleteContents();
        // Insert \n — in <pre> this renders as a real newline
        r.insertNode(document.createTextNode('\n'));
        r.collapse(false); sel.removeAllRanges(); sel.addRange(r);
        notifyDebounced();
      }
    }
  });

  // Restore align
  if((align||'left')==='center'){pre.style.marginLeft='auto';pre.style.marginRight='auto';}
  else if(align==='right'){pre.style.marginLeft='auto';pre.style.marginRight='0';}

  outer.appendChild(bar);
  outer.appendChild(pre);
  outer.addEventListener('mouseenter',()=>{ barCancelHide(); bar.style.display='flex'; });
  outer.addEventListener('mouseleave',()=>barDelayHide(bar));
  bar.addEventListener('mouseenter', barCancelHide);
  bar.addEventListener('mouseleave', ()=>barDelayHide(bar));
  row.appendChild(outer);
  container.appendChild(row);
  return row;
}

    'display:none;gap:4px;white-space:nowrap;z-index:20;box-shadow:0 4px 16px rgba(0,0,0,.5);align-items:center;';
  const mkB=(t,fn)=>{const b=document.createElement('button');b.textContent=t;
    b.style.cssText='background:transparent;border:none;color:#e8edf8;font-size:11px;cursor:pointer;padding:3px 8px;border-radius:5px;';

  const _sp=document.createElement('div');_sp.style.cssText='width:1px;background:#2a3354;margin:2px 4px;align-self:stretch;';

  // Width presets
  ['50%','75%','100%'].forEach(ww=>bar.appendChild(mkB(ww,()=>{

  })));

  // Align
  [['◀','left'],['■','center'],['▶','right']].forEach(([l,a])=>bar.appendChild(mkB(l,()=>{
    outer.dataset.pdfAlign=a;
    if(a==='center'){iframe.style.marginLeft='auto';iframe.style.marginRight='auto';}
    else if(a==='right'){iframe.style.marginLeft='auto';iframe.style.marginRight='0';}
    else{iframe.style.marginLeft='0';iframe.style.marginRight='0';}
    notify();
  })));
  bar.appendChild(_sp.cloneNode());
  bar.appendChild(mkB('🔗',()=>{
    const abs=outer.dataset.pdfAbs;
    if(abs&&window.bridge&&window.bridge.open_url) window.bridge.open_url(abs);

  bar.appendChild(mkB('📂',()=>{
    const rel=outer.dataset.pdfRel;
    if(rel&&window.bridge&&window.bridge.open_local_folder) window.bridge.open_local_folder(rel);
  }));
  bar.appendChild(_sp.cloneNode());
  bar.appendChild(mkB('🗑',()=>{
    const rel=outer.dataset.pdfRel;
    row.remove();
    if(rel&&window.bridge&&window.bridge.request_delete_file) window.bridge.request_delete_file(rel);
    showDeleteToast('File PDF');
    notify();
  }));

  // Restore align
  if((align||'left')==='center'){iframe.style.marginLeft='auto';iframe.style.marginRight='auto';}
  else if(align==='right'){iframe.style.marginLeft='auto';iframe.style.marginRight='0';}

  // ── Drag-resize handle (bottom edge) ──────────────────────────────────────
  const resizeBar=document.createElement('div');
  resizeBar.style.cssText='width:100%;height:8px;background:#2a3354;cursor:ns-resize;'+
    'border-radius:0 0 6px 6px;display:flex;align-items:center;justify-content:center;'+
    'opacity:0.4;transition:opacity .2s;user-select:none;';
  resizeBar.innerHTML='<div style="width:40px;height:3px;background:#4f8ef7;border-radius:2px"></div>';
  resizeBar.addEventListener('mouseover',()=>resizeBar.style.opacity='1');
  resizeBar.addEventListener('mouseout', ()=>resizeBar.style.opacity='0.4');

  let _ry=0, _rh2=0, _resizing=false;
  resizeBar.addEventListener('mousedown',ev=>{
    ev.preventDefault(); ev.stopPropagation();
    _resizing=true; _ry=ev.clientY; _rh2=iframe.getBoundingClientRect().height;
    function onM(e){
      if(!_resizing)return;
      const nh=Math.max(100,_rh2+(e.clientY-_ry));

    function onU(){ _resizing=false; document.removeEventListener('mousemove',onM); document.removeEventListener('mouseup',onU); notify(); }
    document.addEventListener('mousemove',onM);
    document.addEventListener('mouseup',onU);
  });

  outer.appendChild(bar);
  outer.appendChild(iframe);
  outer.appendChild(resizeBar);
  bar.addEventListener('mouseenter',barCancelHide);
  bar.addEventListener('mouseleave',()=>barDelayHide(bar));
  outer.addEventListener('mouseenter',()=>{ barCancelHide(); bar.style.display='flex'; });
  outer.addEventListener('mouseleave',()=>barDelayHide(bar));
  row.appendChild(outer);container.appendChild(row);return row;
}

// Global error handler — log but don't crash the editor
window.onerror = function(msg, src, line, col, err){
  if(window.bridge && window.bridge.log) window.bridge.log('JS ERROR: ' + msg + ' @' + line);
  console.error(msg, err);

new QWebChannel(qt.webChannelTransport, function(ch){
  window.bridge = ch.objects.bridge;
  bridge.get_theme(t => { try{ editorCmd.applyTheme(t); }catch(e){} });
  _ready = true;
  addTextRow(root, '');
  _history = [serialize()]; _histIdx = 0;
  bridge.on_ready();
  // Fetch all tags so inline #tag chips get the right color immediately
  _loadTagsMap();

  // ── Auto-delete local image files when blocks are removed ──────────────────
  // Watches ALL removal paths: Backspace, menu "Xóa Block", Ctrl+X, etc.
  //
  // FIX: _placeBlock() moves a newly-created row via target.after(newRow), which
  // briefly removes the node from the DOM before re-inserting it.  The naïve
  // observer fired request_delete_image() during that transient remove, wiping
  // the file even though the block still existed in the editor.
  //
  // Solution: collect candidates, then re-check in a microtask (Promise).
  // By the time the microtask runs the DOM move is complete, so any node that
  // is still in the document was only *moved* — we skip it.  Only nodes truly
  // gone (Backspace / Ctrl-X / menu delete) are sent to request_delete_image.
  const _imgObserver = new MutationObserver(mutations => {
    // Skip deletions while note content is being replaced (setContent / clear).
    // When _loading=true we are switching notes or initialising — nodes removed
    // from the DOM at this point are NOT user-deleted; never delete their files.
    if(_loading || _undoInProgress) return;

    const pending = [];
    for(const m of mutations){
      for(const node of m.removedNodes){
        if(node.nodeType !== 1) continue;
        const imgs = node.tagName === 'IMG'
          ? [node]
          : [...node.querySelectorAll('img[data-local]')];
        for(const img of imgs){
          const local = img.dataset && img.dataset.local;
          if(local) pending.push(img);
        }
      }
    }
    if(!pending.length) return;
    // Defer one microtask so any _placeBlock re-insert can complete first.
    Promise.resolve().then(() => {
      // Double-check: content may have started loading between the observer
      // callback and this microtask (e.g. rapid note switch).
      if(_loading || _undoInProgress) return;
      for(const img of pending){
        if(document.contains(img)) continue; // still in DOM = just a move
        const local = img.dataset && img.dataset.local;
        if(local && window.bridge && window.bridge.request_delete_image){
          window.bridge.request_delete_image(local);
        }
      }
    });
  });
  _imgObserver.observe(root, { childList: true, subtree: true });

  // ── Wheel scroll ──────────────────────────────────────────────────────────
  document.addEventListener('wheel', e=>{
    e.preventDefault();
    window.scrollBy({top: e.deltaY * 1.2, behavior: 'instant'});
  }, {passive: false});

  // ── Pure-JS custom scrollbar ─────────────────────────────────────────────────
  (function(){
    const track = document.createElement('div');
    track.id = 'js-sb-track';
    const thumb = document.createElement('div');
    thumb.id = 'js-sb-thumb';
    track.appendChild(thumb);
    document.body.appendChild(track);

    let _drag=false, _dragStartY=0, _dragStartScroll=0;

    function _update(){
      const scrollH = Math.max(
        document.documentElement.scrollHeight,
        document.body.scrollHeight);
      const viewH   = window.innerHeight;
      const maxSc   = scrollH - viewH;
      if(maxSc < 10){ thumb.style.display='none'; return; }
      thumb.style.display = 'block';
      const ratio   = viewH / scrollH;
      const thumbH  = Math.max(28, ratio * viewH);
      const thumbTop= (window.scrollY / maxSc) * (viewH - thumbH);
      thumb.style.height = thumbH + 'px';
      thumb.style.top = Math.min(viewH - thumbH, Math.max(0, thumbTop)) + 'px';
    }

    thumb.addEventListener('mousedown', e=>{
      _drag=true; _dragStartY=e.clientY; _dragStartScroll=window.scrollY;
      thumb.classList.add('dragging');
      e.preventDefault(); e.stopPropagation();
    });
    document.addEventListener('mousemove', e=>{
      if(!_drag) return;
      const scrollH = Math.max(
        document.documentElement.scrollHeight, document.body.scrollHeight);
      const viewH   = window.innerHeight;
      const thumbH  = thumb.offsetHeight;
      const trackH  = viewH - thumbH;
      const ratio   = (scrollH - viewH) / Math.max(1, trackH);
      window.scrollTo(0, _dragStartScroll + (e.clientY - _dragStartY) * ratio);
      e.preventDefault();
    });
    document.addEventListener('mouseup', ()=>{
      if(!_drag) return;
      _drag=false; thumb.classList.remove('dragging');
    });

    track.addEventListener('mousedown', e=>{
      if(e.target!==track) return;
      const r   = track.getBoundingClientRect();
      const pct = (e.clientY - r.top) / r.height;
      const scrollH = Math.max(
        document.documentElement.scrollHeight, document.body.scrollHeight);
      window.scrollTo(0, pct * (scrollH - window.innerHeight));
    });

    window.addEventListener('scroll', _update, {passive:true});
    window.addEventListener('resize', _update, {passive:true});
    new MutationObserver(_update).observe(
      document.getElementById('root') || document.body,
      {childList:true, subtree:true, characterData:true});

    window._updateScrollbar = _update;
    setTimeout(_update, 200);
  })();
});
