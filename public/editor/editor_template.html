</style></head>
<body><div id="root"></div>
<!-- WEB ADAPTER (galaxynote-web only): polyfills window.QWebChannel /
     qt.webChannelTransport so the *unmodified* desktop editor below can run
     inside a browser iframe, forwarding bridge.* calls to the React host via
     postMessage instead of Qt's native transport. Nothing below this line
     was changed from the PySide6 desktop version. -->
<script src="./bridge_shim.js"></script>
<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
<script>
'use strict';
const root = document.getElementById('root');
let _ready = false, _ro = false;

/** Safe wrapper: e.target may be a Text node (no .closest). Always use tgt(e). */
function tgt(e){ const t=e.target; return (t && t.nodeType===1) ? t : t && t.parentElement; }
let _focusedContainer = null, _lastFocusedRow = null;
let _history = [], _histIdx = -1, _undoing = false;
let _undoInProgress = false; // blocks MutationObserver deletion during undo+restore


// ── Soft-delete toast ─────────────────────────────────────────────────────
let _toastTimer = null;
function showToast(msg){
  let t = document.getElementById('del-toast');
  if(!t) return;
  t.innerHTML = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 4500);
}
function showDeleteToast(label){
  showToast('🗑 <b>' + label + '</b> đã xóa &nbsp;'
    + '<kbd style="background:var(--border,#2a3560);padding:1px 6px;'
    + 'border-radius:4px;font-size:11px;font-family:monospace">Ctrl+Z</kbd>'
    + ' để hoàn tác');
}
function showSaveToast(label){
  showToast('💾 <b>' + label + '</b> đã lưu vào vault');
}

let _findIdx = 0;

// Walk up from el to find the nearest nested container (tgl-body or callout-children)
// Returns root if none found
function _findNested(el){
  let p = el.parentElement;
  while(p && p !== root){
    if(p.classList.contains('tgl-body') || p.classList.contains('callout-children') || p.classList.contains('col-body')) return p;
    p = p.parentElement;
  }
  return root;
}

// ── Reliable cursor-row tracking ─────────────────────────────────────────────
// mousedown fires BEFORE focus/blur, runs in capture phase so it always wins.
// This ensures _lastFocusedRow is correct even when user clicks drag-handle,
// row padding, or when Qt toolbar button click causes WebEngine to blur first.
document.addEventListener('mousedown', e => {
  const row = tgt(e).closest('.blk-row');
  if(row && root.contains(row)){
    _lastFocusedRow   = row;
    _focusedContainer = _findNested(row);  // tgl-body / callout-children / root
  }
}, true);  // capture phase

let _notifyTimer = null, _styleTimer = null;
let _loading = false;
let _lastAlignTarget = null;  // last focused block for alignment   // true during note switch — blocks stale on_change

// ── Helpers ─────────────────────────────────────────────────────────────────
function genId(){ return Math.random().toString(36).slice(2,10); }
function getContainer(){ return _focusedContainer && root.contains(_focusedContainer) ? _focusedContainer : root; }

// Returns true if row is a plain empty text block (just the placeholder, no content).
// Used to decide whether to REPLACE the target row or INSERT after it.
function _isEmptyRow(row){
  if(!row) return false;
  const b = row.querySelector(':scope > .block');   // direct child only (not toggle body)
  return b && !b.textContent.trim() && !b.querySelector('img,iframe,table');
}

// Insert newRow after target; if target was an empty text block, remove it
// so the new block takes its exact position (replace semantics).
function _placeBlock(newRow, target, c){
  if(target && target.parentElement === c && target !== newRow){
    target.after(newRow);
    if(_isEmptyRow(target)) target.remove();
  }
}

// ── Placeholder ──────────────────────────────────────────────────────────────
function updatePh(el){ el.classList.toggle('ph', !el.textContent.trim() && !el.querySelector('img')); }
function attachPh(el){
  updatePh(el);
  el.addEventListener('focus', () => el.classList.remove('ph'));
  el.addEventListener('blur',  () => updatePh(el));
  el.addEventListener('input', () => updatePh(el));
}

// ── Notify (debounced 300ms) ─────────────────────────────────────────────────
// Delayed bar hide helper — prevents toolbar from vanishing when moving to it
let _barHideTimer = null;
function barDelayHide(bar){
  _barHideTimer = setTimeout(()=>{ bar.style.display='none'; }, 250);
}
function barCancelHide(){
  if(_barHideTimer){ clearTimeout(_barHideTimer); _barHideTimer=null; }
}

function notifyDebounced(){
  if(_loading) return;   // drop stale events from previous note
  if(_notifyTimer) clearTimeout(_notifyTimer);
  _notifyTimer = setTimeout(notify, 300);
}
function notify(){
  if(!_ready || !window.bridge || _loading) return;   // block during switch
  const s = serialize();
  if(!_undoing){
    if(_histIdx < 0 || _history[_histIdx] !== s){
      _history = _history.slice(0, _histIdx + 1);
      _history.push(s);
      _histIdx++;
      if(_history.length > 60){ _history.shift(); _histIdx--; }
    }
  }
  window.bridge.on_change(s);
  sendStyle();
  // Debounce scroll report — content change may alter page height
  if(typeof window._updateScrollbar === 'function') setTimeout(window._updateScrollbar, 80);
}

// ── Style detection ──────────────────────────────────────────────────────────
function sendStyle(){
  if(_styleTimer) clearTimeout(_styleTimer);
  _styleTimer = setTimeout(() => {
    if(!window.bridge) return;
    const sel = window.getSelection();
    let node = sel && sel.rangeCount ? sel.anchorNode : null;
    if(node && node.nodeType === 3) node = node.parentNode;
    // Walk up to find the closest styled element (span/font with explicit style)
    let styledNode = node;
    if(node){
      let cur = node;
      while(cur && cur !== document.body){
        const s = window.getComputedStyle(cur);
        if(cur.style && (cur.style.fontFamily || cur.style.fontSize)) { styledNode = cur; break; }
        cur = cur.parentNode;
      }
    }
    const st = window.getComputedStyle(styledNode || node || document.body);
    // Font family: pick first non-generic family
    let ff = st.fontFamily || '';
    const parts = ff.split(',');
    const generics = ['serif','sans-serif','monospace','cursive','fantasy','system-ui'];
    let bestFf = parts[0].replace(/['"]/g,'').trim();
    for(const p of parts){
      const clean = p.replace(/['"]/g,'').trim();
      if(!generics.includes(clean.toLowerCase())){ bestFf = clean; break; }
    }
    // Font size in pt (editor stores in pt)
    const fzPx = parseFloat(st.fontSize) || 14;
    const fzPt = Math.round(fzPx * 0.75);
    // Detect block type (heading, list, etc.) by walking up from node
    let blockTag = '';
    let cur2 = node;
    while(cur2 && cur2 !== document.body){
      const tn = cur2.tagName ? cur2.tagName.toLowerCase() : '';
      if(['h1','h2','h3','h4','h5','h6','ul','ol','blockquote','pre'].includes(tn)){
        blockTag = tn; break;
      }
      // Check data-blk-type on .block elements
      if(cur2.classList && cur2.classList.contains('block') && cur2.dataset.blkType){
        blockTag = cur2.dataset.blkType; break;
      }
      cur2 = cur2.parentNode;
    }

    // Detect alignment
    let align = 'left';
    try{ align = document.queryCommandValue('justifyLeft')  ? 'left'
               : document.queryCommandValue('justifyCenter')? 'center'
               : document.queryCommandValue('justifyRight') ? 'right'
               : document.queryCommandValue('justifyFull')  ? 'justify'
               : 'left'; } catch(e){}
    // More reliable alignment via computed textAlign on the block element
    const blkEl = node ? (node.closest ? node.closest('.block,.tgl-title') : null) : null;
    if(blkEl){
      const ta = window.getComputedStyle(blkEl).textAlign;
      // 'start' = left in LTR, '-webkit-auto' = default/left
      if(ta==='center') align='center';
      else if(ta==='right') align='right';
      else if(ta==='justify'||ta==='justify-all') align='justify';
      else align='left';
    } else {
      // Fallback: check the block's inline style directly
      let cur = node;
      while(cur && cur!==document.body){
        const el = cur.nodeType===1 ? cur : cur.parentElement;
        if(!el) break;
        if(el.style && el.style.textAlign){
          const ta = el.style.textAlign;
          if(ta==='center') align='center';
          else if(ta==='right') align='right';
          else if(ta==='justify') align='justify';
          else align='left';
          break;
        }
        cur = el.parentNode;
      }
    }

    window.bridge.on_style_change(JSON.stringify({
      b:  document.queryCommandState('bold'),
      i:  document.queryCommandState('italic'),
      u:  document.queryCommandState('underline'),
      s:  document.queryCommandState('strikeThrough'),
      ff: bestFf,
      fz: fzPt + 'pt',
      heading: blockTag,
      align:   align,
      bullet:  blockTag === 'ul' || blockTag === 'bullet',
      numbered:blockTag === 'ol' || blockTag === 'numbered',
    }));
  }, 80);
}
document.addEventListener('selectionchange', sendStyle);

// Track last focused block for toolbar alignment (selection lost on button click)
document.addEventListener('focusin', (e) => {
  if(e.target && (e.target.classList.contains('block') || e.target.classList.contains('tgl-title') || e.target.tagName === 'TD')){
    _lastAlignTarget = e.target;
  }
});

// ── Global drag guard (capture phase) ───────────────────────────────────────
// Fires BEFORE any element's dragstart handler, preventing Chromium from
// initiating OLE DnD for non-handle elements (which would be modal + block JS).
document.addEventListener('dragstart', function(e) {
  // e.target can be a Text node (no closest method) — always guard first
  const el = e.target && e.target.nodeType === 1 ? e.target : null;
  if(!el || !el.closest('.drag-handle')) {
    e.preventDefault();
    e.stopPropagation();
    return false;
  }
}, true /* capture phase */);

// Recovery: if mouse-based drag gets stuck (e.g. mouseup outside window),
// reset drag state on next mouseup anywhere.
document.addEventListener('mouseup', function() {
  if(_mdRow || _mdClone) {
    _mdEnd();
  }
}, true /* capture phase */);

// _mdRow/_mdTarget/_mdClone are declared in the mouse-drag block above.
// ── Mouse-event drag — avoids HTML5 DnD / OLE modal which freezes QWebEngine ─
// HTML5 DnD uses OLE DoDragDrop() on Windows which is MODAL and blocks the
// Qt event loop. After the modal ends, Chromium's mouse state is corrupted.
// Mouse events (mousedown/mousemove/mouseup) have none of these issues.

let _mdRow    = null;   // row being dragged
let _mdClone  = null;   // floating visual ghost
let _mdTarget = null;   // current drop target row

function _mdStart(row, clientY){
  _mdRow = row;
  row.classList.add('dragging');
  // Create ghost clone that follows the cursor
  _mdClone = row.cloneNode(true);
  const rect = row.getBoundingClientRect();
  _mdClone.style.cssText = [
    'position:fixed','pointer-events:none','opacity:0.65','z-index:9999',
    'left:' + rect.left + 'px','width:' + rect.width + 'px',
    'top:' + clientY + 'px','box-shadow:0 4px 16px rgba(0,0,0,.4)',
    'border-radius:6px','background:var(--panel-bg,#141d35)',
  ].join(';');
  document.body.appendChild(_mdClone);
}

function _mdMove(clientY){
  if(!_mdClone || !_mdRow) return;
  _mdClone.style.top = clientY + 'px';

  // Search ALL visible blk-rows in the editor (including inside tgl-body)
  // so the user can drag blocks into or out of toggle containers.
  const allRows = [...root.querySelectorAll('.blk-row')]
    .filter(r => r !== _mdRow && r !== _mdClone && r.offsetParent !== null);

  let closest = null, closestDist = Infinity;
  allRows.forEach(r => {
    const rect = r.getBoundingClientRect();
    const mid  = rect.top + rect.height / 2;
    const d    = Math.abs(clientY - mid);
    if(d < closestDist){ closestDist = d; closest = r; }
  });

  document.querySelectorAll('.blk-row.drag-over').forEach(r => r.classList.remove('drag-over'));
  if(closest && closestDist < 80){
    closest.classList.add('drag-over');
    _mdTarget = closest;
  } else {
    _mdTarget = null;
  }
}

function _mdEnd(){
  if(_mdClone){ _mdClone.remove(); _mdClone = null; }
  document.querySelectorAll('.blk-row.drag-over,.blk-row.dragging')
    .forEach(r => r.classList.remove('drag-over','dragging'));

  // Always log so we can see what happened even if conditions fail
  console.log('[drag-end] _mdRow:', !!_mdRow, '_mdTarget:', !!_mdTarget,
    'tgt class:', _mdTarget?.className?.slice(0,40));

  if(_mdRow && _mdTarget && _mdTarget !== _mdRow){
    const srcParent = _mdRow.parentElement;
    const tgtParent = _mdTarget.parentElement;

    console.log('[drag-end] srcParent:', srcParent?.className?.slice(0,40) || srcParent?.id);
    console.log('[drag-end] tgtParent:', tgtParent?.className?.slice(0,40) || tgtParent?.id);
    console.log('[drag-end] _mdTarget has tgl-row?', !!_mdTarget.querySelector('.tgl-row'));

    if(srcParent === tgtParent){
      const srcIdx = [...srcParent.children].indexOf(_mdRow);
      const tgtIdx = [...tgtParent.children].indexOf(_mdTarget);
      tgtParent.insertBefore(_mdRow, srcIdx < tgtIdx ? _mdTarget.nextSibling : _mdTarget);
    } else {
      _mdTarget.after(_mdRow);
      if(srcParent !== root && !srcParent.querySelector('.blk-row')){
        addTextRow(srcParent, '', false);
      }
    }
    _focusedContainer = _mdRow.parentElement;

    // Debug: trace serialized position of embed after drag
    const _snap = JSON.parse(serialize());
    const _trace = (blocks, path) => {
      blocks.forEach((b, i) => {
        if(b.t === 'embed') console.log(`[drag-serialize] embed at path: ${path}[${i}]`);
        if(b.t === 'toggle') _trace(b.children||[], `${path}[${i}].children`);
      });
    };
    _trace(_snap.blocks, 'root');

    notify();
  }
  _mdRow = null; _mdTarget = null;
}

function makeDragHandle(){
  const h = document.createElement('div');
  h.className = 'drag-handle'; h.innerHTML = '⠿';
  h.style.pointerEvents = 'all';
  h.contentEditable = 'false'; h.tabIndex = -1;
  // Mouse-based drag — distinguish click vs drag by movement threshold.
  // We do NOT call e.preventDefault() on mousedown because that suppresses
  // the subsequent click event, breaking showBlockMenu.
  h.addEventListener('mousedown', e => {
    if(e.button !== 0) return;
    e.stopPropagation();                       // prevent text-selection start
    const row = h.closest('.blk-row');
    if(!row) return;
    let isDragging = false;
    const startX = e.clientX, startY = e.clientY;
    const THRESH = 5;                          // px threshold before drag starts

    const onMove = e2 => {
      if(!isDragging){
        if(Math.abs(e2.clientX-startX) > THRESH || Math.abs(e2.clientY-startY) > THRESH){
          isDragging = true;
          e2.preventDefault();                 // only prevent default when drag confirmed
          _mdStart(row, e2.clientY);
        }
      } else {
        _mdMove(e2.clientY);
      }
    };
    const onUp = e2 => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
      if(isDragging){
        _mdEnd();
      } else {
        // Tap/click without drag → show block menu
        showBlockMenu(row, e.clientX, e.clientY);
      }
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
  });
  return h;
}

// ── File drop from OS (e.g. drag image from Explorer into editor) ────────────
root.addEventListener('drop', e => {
  if(_mdRow) return;    // mouse-drag in progress — ignore OS drops during block drag
  const files = e.dataTransfer && e.dataTransfer.files;
  if(!files || files.length === 0) return;
  const imgFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
  if(imgFiles.length === 0) return;
  e.preventDefault(); e.stopPropagation();
  const targetRow = tgt(e).closest('.blk-row') || _lastFocusedRow;
  imgFiles.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      const dataUrl = ev.target.result;
      const tid = genId();
      const c = targetRow ? targetRow.parentElement : root;
      const nr = addImageRow(c, dataUrl, 0, 'left');
      const img = nr.querySelector('img');
      if(img){
        img.dataset.tid = tid;
        // Save to ATTACHMENTS_DIR via bridge (same path as pasted images)
        if(window.bridge && window.bridge.request_save_pasted_image)
          window.bridge.request_save_pasted_image(dataUrl, tid);
      }
      if(targetRow) targetRow.after(nr);
      notify();
    };
    reader.readAsDataURL(file);
  });
});
// Block reorder now handled by mouse events in makeDragHandle() above.

// ── Multi-select ──────────────────────────────────────────────────────────────
let _isSelecting = false, _startBlock = null, _endBlock = null;
document.addEventListener('mousedown', e => {
  if(e.button !== 0) return;
  if(!e.shiftKey) clearSel();
  const row = tgt(e).closest('.blk-row');
  if(row){ _isSelecting = true; _startBlock = row; _endBlock = row; }
  else { _isSelecting = false; _startBlock = _endBlock = null; }
});
document.addEventListener('mousemove', e => {
  if(!_isSelecting || !_startBlock || e.buttons !== 1) return;
  const row = tgt(e).closest('.blk-row');
  const editable = tgt(e).closest('.block,.tgl-title,.task-text');
  if(row && row !== _endBlock){
    document.body.classList.add('multi-selecting');
    window.getSelection().removeAllRanges();
    _endBlock = row;
    const allRows = [...document.querySelectorAll('.blk-row')];
    const i1 = allRows.indexOf(_startBlock), i2 = allRows.indexOf(_endBlock);
    if(i1 !== -1 && i2 !== -1){
      clearSel();
      for(let i = Math.min(i1,i2); i <= Math.max(i1,i2); i++) allRows[i].classList.add('multi-sel');
    }
  }
});
document.addEventListener('mouseup', () => {
  _isSelecting = false;
  setTimeout(() => document.body.classList.remove('multi-selecting'), 50);
  // Format painter: apply when user releases mouse after selection
  if(window.editorCmd && window.editorCmd._painterActive){
    const sel=window.getSelection();
    if(sel && sel.toString().length > 0){
      setTimeout(()=>window.editorCmd.pasteFormat(), 10);
    }
  }
});
function clearSel(){ document.querySelectorAll('.blk-row.multi-sel').forEach(r => r.classList.remove('multi-sel')); }

// ── Keyboard ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if((e.ctrlKey||e.metaKey) && e.key.toLowerCase() === 'z'){ e.preventDefault(); editorCmd.undo(); return; }
  if((e.ctrlKey||e.metaKey) && e.key.toLowerCase() === 'y'){ e.preventDefault(); editorCmd.redo(); return; }
  const selRows = [...document.querySelectorAll('.blk-row.multi-sel')];
  if(selRows.length > 0 && (e.key === 'Backspace' || e.key === 'Delete')){
    e.preventDefault();
    const parent = selRows[0].parentElement;
    selRows.forEach(r => {
      // Delete local image file if present
      const img = r.querySelector('img[data-local]');
      if(img && img.dataset.local && window.bridge && window.bridge.request_delete_image)
        window.bridge.request_delete_image(img.dataset.local);
      r.remove();
    });
    clearSel();
    if(!parent.querySelector('.blk-row')) addTextRow(parent, '', true);
    notify(); return;
  }
  // Delete a single focused image block that has no text cursor active
  const selImg = document.querySelector('.img-wrap.sel');
  if(selImg && (e.key === 'Delete' || e.key === 'Backspace')){
    const activeEl = document.activeElement;
    const inTextInput = activeEl && (activeEl.isContentEditable || activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA');
    if(!inTextInput){
      e.preventDefault();
      const imgEl    = selImg.querySelector('img');
      const localPath = imgEl && imgEl.dataset.local;
      const imgRow   = selImg.closest('.blk-row');
      const container = imgRow && imgRow.parentElement;
      if(imgRow) imgRow.remove();
      if(localPath && window.bridge && window.bridge.request_delete_image)
        window.bridge.request_delete_image(localPath);
      if(container && !container.querySelector('.blk-row'))
        addTextRow(container, '', true);
      showDeleteToast('Hình ảnh');
      notify(); return;
    }
  }
  // ── Ctrl+C: copy multi-sel blocks OR cross-block selection as plain text ──
  if((e.ctrlKey||e.metaKey) && e.key.toLowerCase() === 'c'){
    const selRows = [...document.querySelectorAll('.blk-row.multi-sel')];
    if(selRows.length > 0){
      // Multi-block selection: gather text from each selected block
      e.preventDefault();
      const lines = [];
      selRows.forEach(row => {
        // text block / toggle title / task
        const block = row.querySelector('.block,.tgl-title,.task-text');
        if(block) lines.push(block.innerText || block.textContent || '');
        // code block
        const pre = row.querySelector('.code-block');
        if(pre) lines.push(_getPreText(pre));
        // quote
        const q = row.querySelector('.quote-block');
        if(q) lines.push(q.innerText || q.textContent || '');
      });
      const txt = lines.filter(Boolean).join('\n');
      try{
        const ta=document.createElement('textarea');
        ta.value=txt; ta.style.cssText='position:fixed;left:-9999px;top:0;opacity:0;';
        document.body.appendChild(ta); ta.focus(); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
      } catch(_){
        navigator.clipboard && navigator.clipboard.writeText(txt);
      }
      return;
    }
    // Native selection across contenteditable boundaries:
    // browser can't do it natively, so read window.getSelection() text
    const nativeSel = window.getSelection();
    if(nativeSel && nativeSel.toString().trim()){
      // Let browser handle — it works within single contenteditable
      return;
    }
  }

  if((e.ctrlKey||e.metaKey) && e.key.toLowerCase() === 'a'){
    const el = document.activeElement;
    if(el && (el.classList.contains('block') || el.classList.contains('tgl-title') || el.classList.contains('task-text'))){
      const sel = window.getSelection();
      if(!sel || sel.toString().length >= el.textContent.length){
        e.preventDefault();
        window.getSelection().removeAllRanges();
        document.querySelectorAll('.blk-row').forEach(r => r.classList.add('multi-sel'));
      }
    } else {
      e.preventDefault();
      document.querySelectorAll('.blk-row').forEach(r => r.classList.add('multi-sel'));
    }
  }
});

// ── Document copy event — ensures tag chips text is included ─────────────────
// Chromium treats contenteditable=false elements as atomic — when user
// drag-selects across a tag chip, the chip text may be omitted from the
// clipboard. We intercept 'copy' and reconstruct text including chip text.
document.addEventListener('copy', e => {
  // Only intercept if we're inside a .block (editor area)
  const active = document.activeElement;
  const inBlock = active && (active.classList.contains('block') ||
                  active.classList.contains('tgl-title') ||
                  active.classList.contains('task-text'));
  if(!inBlock) return;

  const sel = window.getSelection();
  if(!sel || !sel.rangeCount || sel.isCollapsed) return;

  // Walk the selection range and collect text including contenteditable=false spans
  try {
    const range = sel.getRangeAt(0);
    const frag  = range.cloneContents();
    // innerText on a detached fragment doesn't work — use textContent
    // but manually inject newlines for block elements
    function fragText(node) {
      if(node.nodeType === 3) return node.textContent;
      if(node.nodeName === 'BR') return '\n';
      const block = ['P','DIV','H1','H2','H3','LI'].includes(node.nodeName);
      const inner = [...node.childNodes].map(fragText).join('');
      return block ? inner + '\n' : inner;
    }
    const txt = fragText(frag).replace(/\n$/, '');
    if(txt) {
      e.preventDefault();
      e.clipboardData.setData('text/plain', txt);
    }
  } catch(_) {}
});

// ── Serialize ────────────────────────────────────────────────────────────────
// Strip <mark class="gn-find…"> wrappers so find-highlights are never saved to DB
function stripFindMarks(html){
  return html.replace(/<mark class="gn-find[^"]*">([\s\S]*?)<\/mark>/g,'$1');
}

function serializeContainer(c){
  const out = [];
  const isRoot = c === root;
  for(const row of c.children){
    if(!row.classList.contains('blk-row')) continue;
    let bg = '';
    for(const cls of row.classList){ if(cls.startsWith('bg-')){ bg = cls; break; } }
    const tglRow  = row.querySelector(':scope>.tgl-row');
    const colsOuter = row.querySelector(':scope>div>.cols-outer') || row.querySelector(':scope>.cols-outer');
    const imgOuter= row.querySelector(':scope>.img-outer');
    const pdfOuter2= row.querySelector(':scope>.pdf-outer');
    const embedEl = !pdfOuter2 && (row.querySelector(':scope>[data-embed-align]') || row.querySelector(':scope>.embed-outer'));
    const tableWr = row.querySelector(':scope>.resizable-outer');
    const taskRow = row.querySelector(':scope>.task-row');
    const codeOuter2 = row.querySelector(':scope>.code-outer');
    const quoteOuter2= row.querySelector(':scope>.quote-outer');
    const calloutWrap= row.querySelector(':scope>.callout-wrap');
    const blk     = row.querySelector(':scope>.block');

    // Debug: log every row when inside a tgl-body
    if(!isRoot){
      const childClasses = [...row.children].map(el=>el.className?.slice(0,30)+'|'+[...el.attributes].map(a=>a.name).join(','));
      console.log('[serialize-row] tgl-body row → tglRow:'+!!tglRow+' embed:'+!!embedEl+' blk:'+!!blk+' img:'+!!imgOuter+' children:', childClasses);
    }

    if(tglRow){
      const tgl = tglRow.querySelector('.tgl');
      const titleEl = tgl ? tgl.querySelector('.tgl-hdr .tgl-title') : null;
      const body = tgl ? tgl.querySelector('.tgl-body') : null;
      let titleHtml = titleEl ? titleEl.innerHTML : '';
      if(titleHtml === '<br>' || titleHtml === '<br/>') titleHtml = '';
      titleHtml = stripFindMarks(titleHtml);
      const children = body ? serializeContainer(body) : [];
      console.log('[serialize] toggle "' + (titleEl?.textContent||'').slice(0,30) + '" children:', children.length, children.map(c=>c.t));
      out.push({t:'toggle', title:titleHtml, open:!(tgl&&tgl.dataset.closed), bg,
                children});
      continue;
    }
    if(colsOuter){
      const count = parseInt(colsOuter.dataset.colCount) || colsOuter.querySelectorAll(':scope>.col-wrap').length;
      const cols = [...colsOuter.querySelectorAll(':scope>.col-wrap>.col-body')].map(cb => serializeContainer(cb));
      out.push({t:'columns', count, cols, bg});
      continue;
    }
    if(imgOuter){
      const img = imgOuter.querySelector('img');
      const w = img ? (parseInt(img.dataset.w)||img.offsetWidth||0) : 0;
      const localPath = img ? (img.dataset.local||'') : '';
      // When a local file exists for this image, do NOT store the full base64 data
      // URL in the DB — it bloats SQLite (500 KB image → 700 KB of base64 text).
      // Instead store src='' and rely on request_image_data(localPath) on reload.
      // For remote-URL images (no localPath) keep the URL in src as-is.
      // gn:// and file:// schemes are unresolvable after restart → use localPath.
      let srcToStore = (img ? img.src : '') || '';
      if(localPath && srcToStore.startsWith('data:'))
        srcToStore = '';                           // local file → skip base64
      if(!srcToStore || srcToStore.startsWith('gn://') || srcToStore.startsWith('file://'))
        srcToStore = localPath;
      out.push({t:'image', src:srcToStore, w, align:imgOuter.style.textAlign||'left',
                local:localPath, bg});
      continue;
    }
    if(embedEl){
      // embedEl is .embed-outer (old) OR the row has an outerWrap with data-embed-align
      const outerWrap = row.querySelector('[data-embed-align]');
      const iframe = row.querySelector('iframe');
      if(iframe){
        const src   = iframe.src || '';
        const w     = outerWrap ? outerWrap.dataset.embedW  || iframe.getAttribute('width') || '100%' : '100%';
        const h = iframe.style.height ? iframe.style.height.replace('px','') : (iframe.getAttribute('height')||'400');
        const align = outerWrap ? outerWrap.dataset.embedAlign || 'left' : 'left';
        out.push({t:'embed', src, w, h, align, bg});
      }
      continue;
    }
    if(tableWr && tableWr.querySelector('.tbl-outer')){
      // New table structure: .resizable-outer > .tbl-outer > table
      const tblOuter = tableWr.querySelector('.tbl-outer');
      const tbl = tblOuter ? tblOuter.querySelector('table') : null;
      if(tbl){
        const rows = [];
        tbl.querySelectorAll('tr').forEach(tr => {
          const rd = []; tr.querySelectorAll('td').forEach(td => rd.push({html:stripFindMarks(td.innerHTML), w:td.style.width||null}));
          rows.push(rd);
        });
        const align = tableWr.dataset.align||'left';
        const w     = tableWr.dataset.w||tblOuter.style.width||'50%';
        const hasHeader = tbl.classList.contains('has-header');
        const hasColHdr = tbl.classList.contains('has-col-header');
        out.push({t:'table', rows, bg, align, w, hasHeader, hasColHdr});
      }
      continue;
    }
    if(taskRow){
      const cb = taskRow.querySelector('.task-cb');
      const txt = taskRow.querySelector('.task-text');
      const bid = row.dataset.blockId || genId();
      row.dataset.blockId = bid;
      const dueBadge = row.querySelector('.task-due-badge');
      const due = dueBadge ? (dueBadge.dataset.due || '') : '';
      out.push({t:'task', html:txt?stripFindMarks(txt.innerHTML):'', done:cb?cb.checked:false, block_id:bid, due, bg});
      continue;
    }
    if(pdfOuter2){
      // Store ONLY rel path — HTTP server URL changes on each app restart
      const _pdfH = (pdfOuter2.dataset.pdfH||'600').toString().replace('px','');
      out.push({t:'pdf',
        rel:   pdfOuter2.dataset.pdfRel  ||'',
        name:  pdfOuter2.dataset.pdfName ||'',
        align: pdfOuter2.dataset.pdfAlign||'left',
        w:     pdfOuter2.dataset.pdfW    ||'100%',
        h:     _pdfH,
        bg});
      continue;
    }
    const quoteOuter = quoteOuter2;
    if(quoteOuter){
      const q=quoteOuter.querySelector('.quote-block');
      out.push({t:'quote', html:q?stripFindMarks(q.innerHTML):'',
        align:quoteOuter.dataset.align||'left', w:quoteOuter.dataset.w||'100%', bg});
      continue;
    }
    if(calloutWrap){
      const iconEl = calloutWrap.querySelector('.callout-icon');
      const childrenDiv = calloutWrap.querySelector('.callout-children');
      out.push({t:'callout',
        icon:     iconEl ? iconEl.textContent : '💡',
        color:    calloutWrap.dataset.color || 'blue',
        align:    calloutWrap.dataset.align || 'left',
        w:        calloutWrap.dataset.w     || '100%',
        children: childrenDiv ? serializeContainer(childrenDiv) : [],
        bg});
      continue;
    }
    const codeOuter = codeOuter2;
    if(codeOuter){
      const pre=codeOuter.querySelector('.code-block');
      out.push({t:'code', code:pre?_getPreText(pre):'',
        align:codeOuter.dataset.codeAlign||'left',
        w:codeOuter.dataset.codeW||'100%',
        wrap:codeOuter.dataset.codeWrap==='1'||false, bg});
      continue;
    }
    if(blk){
      const btype = blk.dataset.blkType||'';
      out.push({t:'text', html:stripFindMarks(blk.innerHTML), blockType:btype, bg});
    }
  }
  return out;
}
function serialize(){ return JSON.stringify({v:4, blocks:serializeContainer(root)}); }

// ── Load ─────────────────────────────────────────────────────────────────────
function loadContainer(c, blocks){
  c.innerHTML = '';
  for(const b of blocks||[]){
    if(b.t==='pdf'){
      // Always reconstruct URL from rel path via bridge (port changes on restart)
      const pdfRow = addPdfRow(c, '', b.rel||'', b.name||'', b.w||'100%', b.align||'left', b.h||'600', b.bg);
      if(b.rel && window.bridge){
        window.bridge.request_pdf_data(b.rel, (url)=>{
          if(!url) return;
          const ifr=pdfRow.querySelector('iframe'); if(ifr) ifr.src=url;
          pdfRow.querySelector('.pdf-outer').dataset.pdfAbs=url;
        });
      }
    }
    else if(b.t==='quote') addQuoteRow(c, b.html||'', b.align||'left', b.w||'100%', b.bg);
    else if(b.t==='callout') addCalloutRow(c, b.icon||'💡', b.children||[], b.color||'blue', b.align||'left', b.w||'100%', b.bg);
    else if(b.t==='code'){ const _cr=addCodeRow(c, b.code||'', b.align||'left', b.w||'100%', b.bg); if(b.wrap&&_cr){ const _co=_cr.querySelector('.code-outer'); if(_co){ _co.dataset.codeWrap='1'; const _cp=_cr.querySelector('.code-block'); if(_cp){_cp.style.whiteSpace='pre-wrap';_cp.style.overflowX='hidden';_cp.style.wordBreak='break-all';} } } }
    else if(b.t==='text'){
      const _r = addTextRow(c, b.html||'', false, b.bg);
      if(b.blockType && _r){ const _blk=_r.querySelector('.block'); if(_blk){ _blk.dataset.blkType=b.blockType; if(b.blockType==='numbered') _blk.dataset.num='1'; } }
    }
    else if(b.t==='toggle') addToggleRow(c, b.title||'', b.open!==false, b.children||[], false, b.bg);
    else if(b.t==='columns') addColumnsRow(c, b.count||2, b.cols||[], false, b.bg);
    else if(b.t==='task'){
      const r = addTaskRow(c, b.html||'', b.done||false, b.block_id||genId(), false, b.bg);
      if(r && b.due) _updateTaskDueBadge(r, b.due);
    }
    else if(b.t==='image'){
      const localPath = b.local||'';
      const storedSrc = b.src||'';
      // If src is a local file path (not http/data), load from bridge
      const isLocalSrc = storedSrc && !storedSrc.startsWith('http') && !storedSrc.startsWith('data:');
      const imgRow = addImageRow(c, isLocalSrc ? '' : storedSrc, b.w||0, b.align||'left', localPath, b.bg);
      if((isLocalSrc||!storedSrc) && localPath && window.bridge){
        window.bridge.request_image_data(localPath, (dataUrl)=>{
          const img = imgRow.querySelector('img');
          if(img && dataUrl){
            img.src = dataUrl;
          } else if(img && !dataUrl){
            // Bridge returned nothing — file may be in trash (undo in progress) or
            // truly gone. Skip replacement if undo is ongoing; otherwise show placeholder.
            if(!_undoInProgress){
              img.dataset.errHandled = '1';
              const ph = document.createElement('div');
              ph.className = 'img-broken';
              ph.innerHTML = '🖼 <span>Hình ảnh không tải được (file bị xóa)</span>';
              img.replaceWith(ph);
            }
          }
        });
      }
    }
    else if(b.t==='embed'){
      const ihtml = `<iframe src="${b.src}" width="${b.w||'100%'}" height="${b.h||'400'}" frameborder="0" allowfullscreen></iframe>`;
      // Must set context so insertEmbed places the row inside container c,
      // not in root (which happens when _lastFocusedRow is null or stale).
      const _prevContainer = _focusedContainer;
      const _prevRow       = _lastFocusedRow;
      _focusedContainer    = c;
      // Use last child of c as the target so embed is appended after it
      const _lastChild = [...c.children].filter(r=>r.classList.contains('blk-row')).pop() || null;
      _lastFocusedRow  = _lastChild;
      const r = editorCmd.insertEmbed(ihtml);
      // Force-move to c if insertEmbed still placed it elsewhere
      const placedCorrectly = r && r.parentElement === c;
      if(r && !placedCorrectly){ c.appendChild(r); }
      console.log(`[B-02] embed deserialize: src=${b.src?.slice(0,40)} | placedCorrectly=${placedCorrectly} | container=${c.className}`);
      _focusedContainer = _prevContainer;
      _lastFocusedRow   = _prevRow;
      // Restore height via direct style
      if(r){ const _ifr=r.querySelector('iframe'); if(_ifr&&b.h) _ifr.style.height=b.h+'px';
        const ow = r.querySelector('[data-embed-align]');
        const iw = r.querySelector('iframe');
        if(b.align && ow){
          ow.dataset.embedAlign = b.align;
          ow.dataset.embedW = b.w||'100%';
        }
        if(iw){
          const a = b.align||'left';
          if(a==='center'){ iw.style.marginLeft='auto'; iw.style.marginRight='auto'; }
          else if(a==='right'){ iw.style.marginLeft='auto'; iw.style.marginRight='0'; }
          else { iw.style.marginLeft='0'; iw.style.marginRight='0'; }
          if(b.w){ iw.style.width = b.w; iw.setAttribute('width', b.w); }
          if(b.h){ iw.style.height = b.h+'px'; }
        }
      }
      if(r && b.bg) r.classList.add(b.bg);
    }
    else if(b.t==='table'){
      const r = addTableRow(c, b.rows||[], false, b.bg);
      const _outerWr = r.querySelector('.resizable-outer');
      const _tblOuter = r.querySelector('.tbl-outer');
      const _tblEl    = r.querySelector('.blk-table');
      // Restore width
      if(_outerWr && b.w){ _outerWr.dataset.w=b.w; if(_tblOuter) _tblOuter.style.width=b.w; }
      // Restore align
      if(_outerWr && b.align){
        _outerWr.dataset.align=b.align;
        if(_tblOuter){
          if(b.align==='center'){_tblOuter.style.marginLeft='auto';_tblOuter.style.marginRight='auto';}
          else if(b.align==='right'){_tblOuter.style.marginLeft='auto';_tblOuter.style.marginRight='0';}
          else{_tblOuter.style.marginLeft='0';_tblOuter.style.marginRight='0';}
        }
      }
      if(_tblEl){
        if(b.hasHeader) _tblEl.classList.add('has-header');
        if(b.hasColHdr) _tblEl.classList.add('has-col-header');
      }
    }
  }
  if(!c.querySelector('.blk-row')) addTextRow(c, '');
  // Render plain-text #tagname occurrences as coloured links.
  // Use a short timeout (not just rAF) so that _loadTagsMap's QWebChannel
  // callback has time to populate _tagsMap before we read tag colours.
  setTimeout(() => { renderTagLinks(c); _applyTagChipColors(); }, 80);
}
function deserialize(input){
  if(!input || !input.trim()){ loadContainer(root,[]); return; }
  let d;
  try{ d = JSON.parse(input); }catch(e){ loadContainer(root,[]); return; }
  if(!d || d.v !== 4){ loadContainer(root,[]); return; }
  loadContainer(root, d.blocks||[]);
}

// ── addTextRow ────────────────────────────────────────────────────────────────
function addTextRow(container, html, focus, bg){
  const row = document.createElement('div'); row.className = 'blk-row';
  if(bg) row.classList.add(bg);
  row.appendChild(makeDragHandle());
  const d = document.createElement('div');
  d.className = 'block'; d.contentEditable = _ro ? 'false' : 'true';
  d.dataset.ph = 'Write something…';
  if(html) d.innerHTML = html;
  d.addEventListener('input', notifyDebounced);
  d.addEventListener('click', onBlockClick);
  attachPh(d);
  d.addEventListener('focus', () => {
    _lastFocusedRow = row;
    _focusedContainer = _findNested(d);
  });
  d.addEventListener('keydown', e => blockKeydown(e, d, row, container));
  row.appendChild(d);
  container.appendChild(row);
  if(focus){ d.focus(); placeCaretAtEnd(d); }
  return row;
}

function blockKeydown(e, d, row, container){
  const btype = d.dataset.blkType || '';

  // Backspace on empty bullet/numbered → exit list (revert to plain text)
  if(e.key === 'Backspace' && !d.textContent.trim() && (btype === 'bullet' || btype === 'numbered')){
    e.preventDefault();
    d.dataset.blkType = '';
    d.removeAttribute('data-num');
    d.focus(); placeCaretAtEnd(d);
    notify(); return;
  }

  if(e.key === 'Backspace' && !d.textContent && container.querySelectorAll('.blk-row').length > 1){
    e.preventDefault();
    const prev = row.previousElementSibling;
    row.remove(); notify();
    if(prev){ const pb = prev.querySelector('.block,.tgl-title,.task-text'); if(pb){ pb.focus(); placeCaretAtEnd(pb); } }
    return;
  }

  if(e.key === 'Enter' && !e.shiftKey){
    const sel = window.getSelection();
    if(sel && sel.anchorNode && sel.anchorNode.parentElement && sel.anchorNode.parentElement.closest('li')) return;
    e.preventDefault();

    // Empty bullet/numbered + Enter → exit list
    if((btype === 'bullet' || btype === 'numbered') && !d.textContent.trim()){
      d.dataset.blkType = '';
      d.removeAttribute('data-num');
      d.focus(); placeCaretAtEnd(d);
      notify(); return;
    }

    let remaining = '';
    if(sel && sel.rangeCount > 0){
      const range = sel.getRangeAt(0);
      if(d.contains(range.commonAncestorContainer)){
        const end = document.createRange(); end.selectNodeContents(d); end.setStart(range.endContainer, range.endOffset);
        const tmp = document.createElement('div'); tmp.appendChild(end.extractContents());
        remaining = tmp.innerHTML === '<br>' ? '' : tmp.innerHTML;
      }
    }
    let nr;
    if(container === root){ nr = addTextRow(root, remaining); row.after(nr); }
    else {
      const rows = [...container.querySelectorAll(':scope>.blk-row')];
      const isLast = rows[rows.length-1] === row;
      if(isLast && !d.textContent.trim() && !remaining){
        let tglRow = container.parentElement;
        while(tglRow && !tglRow.classList.contains('blk-row')) tglRow = tglRow.parentElement;
        const pc = tglRow?.parentElement || root;
        nr = addTextRow(pc, '');
        if(tglRow) tglRow.after(nr); else pc.appendChild(nr);
        row.remove();
      } else { nr = addTextRow(container, remaining); row.after(nr); }
    }
    // ── Continue bullet/numbered format on new row ──────────────────────────
    if(nr && (btype === 'bullet' || btype === 'numbered')){
      const nb = nr.querySelector('.block');
      if(nb){
        nb.dataset.blkType = btype;
        if(btype === 'numbered'){
          // Count numbered siblings up to this new row
          const allRows = (container === root ? root : container).querySelectorAll('.blk-row');
          let n = 1;
          allRows.forEach(r => {
            const b = r.querySelector('.block');
            if(b && b.dataset.blkType === 'numbered') b.dataset.num = String(n++);
          });
        }
      }
    }
    if(nr){ const b = nr.querySelector('.block,.task-text'); if(b) b.focus(); }
    notify();
  }
}

function onBlockClick(e){
  if(e.target.tagName === 'A'){ e.preventDefault(); window.bridge && window.bridge.open_url(e.target.href); return; }
  const w = tgt(e).closest('.img-wrap'); if(w){ e.preventDefault(); selectImg(w); return; }
  deselectImgs();
}

// ── addTaskRow ────────────────────────────────────────────────────────────────
function addTaskRow(container, html, isDone, blockId, focus, bg){
  const row = document.createElement('div'); row.className = 'blk-row';
  row.dataset.blockId = blockId || genId();
  if(bg) row.classList.add(bg);
  row.appendChild(makeDragHandle());
  const taskRow = document.createElement('div'); taskRow.className = 'task-row';
  const cb = document.createElement('input'); cb.type = 'checkbox'; cb.className = 'task-cb'; cb.checked = isDone;
  const txt = document.createElement('div');
  txt.className = 'task-text' + (isDone ? ' done' : '');
  txt.contentEditable = _ro ? 'false' : 'true';
  if(html) txt.innerHTML = html;
  attachPh(txt);
  cb.addEventListener('change', () => {
    txt.classList.toggle('done', cb.checked);
    if(window.bridge) window.bridge.on_task_toggle(row.dataset.blockId, cb.checked);
    notifyDebounced();
  });
  txt.addEventListener('input', notifyDebounced);
  txt.addEventListener('focus', () => { _lastFocusedRow = row; _focusedContainer = _findNested(txt); });
  txt.addEventListener('keydown', e => {
    if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); const nr = addTaskRow(container, '', false, genId(), true); row.after(nr); notify(); }
    if(e.key === 'Backspace' && !txt.textContent && container.querySelectorAll('.blk-row').length > 1){ e.preventDefault(); const prev = row.previousElementSibling; row.remove(); notify(); if(prev){ const pb = prev.querySelector('.block,.tgl-title,.task-text'); if(pb){ pb.focus(); placeCaretAtEnd(pb); } } }
  });
  taskRow.appendChild(cb); taskRow.appendChild(txt);
  row.appendChild(taskRow); container.appendChild(row);
  if(focus){ txt.focus(); placeCaretAtEnd(txt); }
  return row;
}

// ── addColumnsRow ─────────────────────────────────────────────────────────────
// Columns block: N side-by-side containers, each holding its own set of
// blocks. Reuses loadContainer()/serializeContainer() recursively — same
// pattern as toggle's .tgl-body, generalised to N siblings instead of 1.
// Scope note: columns hold text/task/image/toggle/etc. blocks like any
// container, but a column cannot itself contain another columns block
// (nesting columns-in-columns is blocked in insertColumns to keep the grid
// layout + resize math simple — an explicit limit, not a silent one).
function addColumnsRow(container, count, colsBlocks, focusFirst, bg){
  count = Math.max(2, Math.min(5, parseInt(count) || 2));
  const row = document.createElement('div'); row.className = 'blk-row';
  if(bg) row.classList.add(bg);
  row.appendChild(makeDragHandle());

  const hint = document.createElement('div'); hint.className = 'col-resize-hint';
  hint.contentEditable = 'false';
  const label = document.createElement('span'); label.textContent = '▦ Columns:';
  const sel = document.createElement('select');
  for(let n = 2; n <= 5; n++){
    const opt = document.createElement('option'); opt.value = String(n); opt.textContent = String(n);
    if(n === count) opt.selected = true;
    sel.appendChild(opt);
  }
  sel.addEventListener('change', () => {
    const newCount = parseInt(sel.value) || 2;
    const cols = [...outer.querySelectorAll(':scope>.col-wrap>.col-body')].map(cb => serializeContainer(cb));
    while(cols.length < newCount) cols.push([]);
    cols.length = newCount;
    const nr = addColumnsRow(container, newCount, cols, false, bg);
    row.after(nr); row.remove(); notify();
  });
  const del = document.createElement('span'); del.className = 'col-del-btn'; del.textContent = '🗑';
  del.title = 'Delete columns block';
  del.addEventListener('click', () => {
    if(container.querySelectorAll(':scope>.blk-row').length <= 1) return; // keep container non-empty
    row.remove(); notify();
  });
  hint.appendChild(label); hint.appendChild(sel); hint.appendChild(del);

  const outer = document.createElement('div'); outer.className = 'cols-outer';
  outer.dataset.colCount = String(count);
  outer.style.gridTemplateColumns = `repeat(${count}, 1fr)`;
  for(let i = 0; i < count; i++){
    const colWrap = document.createElement('div'); colWrap.className = 'col-wrap';
    const colBody = document.createElement('div'); colBody.className = 'col-body blk-container';
    colWrap.appendChild(colBody);
    outer.appendChild(colWrap);
    loadContainer(colBody, (colsBlocks && colsBlocks[i]) || []);
  }

  const wrap = document.createElement('div'); wrap.className = 'cols-row-wrap';
  wrap.appendChild(hint); wrap.appendChild(outer);
  row.appendChild(wrap);
  container.appendChild(row);

  if(focusFirst){
    const first = outer.querySelector('.col-body .block,.col-body .task-text');
    if(first){ first.focus(); placeCaretAtEnd(first); }
  }
  return row;
}

// ── addToggleRow ───────────────────────────────────────────────────────────────
function addToggleRow(container, title, isOpen, children, focusTitle, bg){
  const row = document.createElement('div'); row.className = 'blk-row';
  if(bg) row.classList.add(bg);
  row.appendChild(makeDragHandle());
  const tglRow = document.createElement('div'); tglRow.className = 'tgl-row';
  const tgl = document.createElement('div'); tgl.className = 'tgl';
  if(!isOpen) tgl.dataset.closed = '1';
  const hdr = document.createElement('div'); hdr.className = 'tgl-hdr';
  const arrow = document.createElement('div'); arrow.className = 'tgl-arrow'; arrow.textContent = isOpen ? '▼' : '▶';
  const body = document.createElement('div'); body.className = 'tgl-body'; if(!isOpen) body.style.display = 'none';
  arrow.addEventListener('click', () => {
    const c = !!tgl.dataset.closed;
    if(c){ delete tgl.dataset.closed; arrow.textContent='▼'; body.style.display=''; addBtn.style.display=''; }
    else { tgl.dataset.closed='1'; arrow.textContent='▶'; body.style.display='none'; addBtn.style.display='none'; }
    notify();
  });
  const titleEl = document.createElement('div'); titleEl.className = 'tgl-title';
  titleEl.contentEditable = _ro ? 'false' : 'true';
  if(title) titleEl.innerHTML = title;
  titleEl.addEventListener('input', notifyDebounced); attachPh(titleEl);
  titleEl.addEventListener('focus', () => { _focusedContainer = body; titleEl.classList.remove('ph'); });
  titleEl.addEventListener('keydown', e => {
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      if(tgl.dataset.closed){ const nr = addToggleRow(container,'',true,[],true); row.after(nr); notify(); }
      else { const f = body.querySelector('.block,.task-text'); if(f){ f.focus(); placeCaretAtEnd(f); } else { addTextRow(body,'',true); notify(); } }
    }
  });
  const addBtn = document.createElement('div'); addBtn.className = 'add-child-btn'; addBtn.textContent = '+ Add block';
  if(!isOpen) addBtn.style.display = 'none';
  addBtn.addEventListener('click', () => { _focusedContainer = body; addTextRow(body,'',true); });
  loadContainer(body, children);
  hdr.appendChild(arrow); hdr.appendChild(titleEl);
  tgl.appendChild(hdr); tgl.appendChild(body); tgl.appendChild(addBtn);
  tglRow.appendChild(tgl); row.appendChild(tglRow); container.appendChild(row);
  if(focusTitle) setTimeout(() => { titleEl.focus(); placeCaretAtEnd(titleEl); }, 60);
  return row;
}

// ── addImageRow ───────────────────────────────────────────────────────────────
let _dh=null,_di=null,_dx=0,_ow=0;
function addImageRow(container, src, w, align, localPath, bg){
  const row = document.createElement('div'); row.className = 'blk-row';
  if(bg) row.classList.add(bg);
  row.appendChild(makeDragHandle());
  const outer = document.createElement('div'); outer.className = 'img-outer'; outer.style.textAlign = align||'left';
  // Prevent browser-native drag on the image block body.
  // Only the makeDragHandle() element should be draggable.
  // Without this, clicking-and-dragging anywhere on the image triggers the
  // browser's built-in contentEditable element drag, which doesn't fire the
  // custom dragstart handler and leaves QWebEngine stuck in a drag cursor state.
  outer.draggable = false;
  outer.addEventListener('dragstart', e => { e.preventDefault(); e.stopPropagation(); });
  const wrap = document.createElement('span'); wrap.className = 'img-wrap';
  // contentEditable='false' deliberately NOT set — it causes Chromium to treat
  // the image as an OLE-draggable atom (modal DnD) that bypasses JS events.
  wrap.draggable = false;
  wrap.addEventListener('dragstart', e => { e.preventDefault(); e.stopPropagation(); return false; });
  const img = document.createElement('img'); img.src = src; img.draggable = false;
  img.addEventListener('dragstart', e => { e.preventDefault(); e.stopPropagation(); });
  img.onerror = function(){
    // If a local file path is set, the image will be loaded async via
    // request_image_data() — do not replace with broken placeholder yet.
    if(img.dataset.local) return;
    // If a tid is set, Python is still processing the image async (clipboard read,
    // download, etc.).  img.src is intentionally empty right now — do NOT replace
    // with the broken placeholder or updateImageSrc() will find no element.
    if(img.dataset.tid) return;
    // Replace broken img with a placeholder div
    if(img.dataset.errHandled) return; img.dataset.errHandled='1';
    const ph = document.createElement('div');
    ph.className = 'img-broken';
    ph.innerHTML = '🖼 <span>Hình ảnh không tải được</span>';
    img.replaceWith(ph);
  };
  if(localPath) img.dataset.local = localPath;
  if(w > 0){ img.style.width = w+'px'; img.dataset.w = w; }
  // When w=0 (new paste / first load): don't set a % width — it resolves relative to
  // .img-wrap (inline-block) whose width depends on the image itself, causing a circular
  // dependency that makes large images overflow and small Zalo stickers render tiny.
  // Instead just let max-width:100% cap the image and measure real px after load.
  img.style.maxWidth = '100%';
  img.addEventListener('load', () => {
    if(!img.dataset.w){
      // Measure the rendered pixel width. Use requestAnimationFrame so Chromium has
      // completed layout — without it offsetWidth can be 0 if called synchronously
      // right after setting img.src.
      requestAnimationFrame(() => {
        const px = img.offsetWidth;
        if(px > 0){
          img.dataset.w = px;
          img.style.width = px + 'px';  // lock to px so % doesn't shift on resize
        }
      });
    }
  }, {once:true});
  const bar = document.createElement('div'); bar.className = 'img-bar';
  // Width presets
  ['25%','50%','75%','100%'].forEach(ww => {
    const b = document.createElement('button'); b.textContent = ww;
    b.onclick = e => {
      e.stopPropagation();
      // Setting img.style.width to a percentage inside .img-wrap (inline-block)
      // creates a CSS circular dependency → browser treats it as auto → image
      // doesn't visually resize at all.  Instead, calculate the target px from
      // .img-outer (flex:1 → full line width) and set an explicit pixel width.
      const pct = parseInt(ww) / 100;
      const containerW = outer.offsetWidth || 700;
      const targetPx = Math.round(containerW * pct);
      img.style.width = targetPx + 'px';
      img.dataset.w = targetPx;
      notify();
    };
    bar.appendChild(b);
  });
  const _sep = document.createElement('div');
  _sep.style.cssText = 'width:1px;background:#444;margin:2px 3px;align-self:stretch;';
  bar.appendChild(_sep);
  // Alignment
  [['◀','left'],['■','center'],['▶','right']].forEach(([l,a]) => {
    const b = document.createElement('button'); b.textContent = l;
    b.onclick = e => { e.stopPropagation(); outer.style.textAlign = a; notify(); };
    bar.appendChild(b);
  });
  bar.appendChild(_sep.cloneNode());
  // Open containing folder (only for locally saved images)
  const fb = document.createElement('button'); fb.textContent = '📂';
  fb.title = 'Mở thư mục chứa file';
  fb.onclick = e => {
    e.stopPropagation();
    const p = img.dataset.local;
    if(p && window.bridge && window.bridge.open_local_folder) window.bridge.open_local_folder(p);
  };
  fb.style.display = localPath ? '' : 'none';
  img.addEventListener('load', () => { fb.style.display = img.dataset.local ? '' : 'none'; });
  bar.appendChild(fb);
  // Edit URL button (only for external URL images without local copy)
  const eb = document.createElement('button'); eb.textContent = '✏';
  eb.title = 'Sửa URL hình ảnh';
  eb.onclick = e => {
    e.stopPropagation();
    if(window.bridge && window.bridge.trigger_edit_image_url)
      window.bridge.trigger_edit_image_url(img.src, img.dataset.tid || genId());
  };
  const _updateEditBtn = () => {
    const isExternal = img.src && img.src.startsWith('http') && !img.dataset.local;
    eb.style.display = isExternal ? '' : 'none';
  };
  _updateEditBtn();
  img.addEventListener('load', _updateEditBtn);
  bar.appendChild(eb);
  const db = document.createElement('button'); db.textContent = '🗑';
  db.onclick = e => { e.stopPropagation(); const p=img.dataset.local; row.remove(); if(p&&window.bridge&&window.bridge.request_delete_image) window.bridge.request_delete_image(p); showDeleteToast('Hình ảnh'); notify(); };
  bar.appendChild(db);
  ['tl','tr','ml','mr','bl','br'].forEach(p => {
    const h = document.createElement('span'); h.className='img-handle h-'+p; h.dataset.pos=p;
    h.addEventListener('mousedown', ev => { ev.preventDefault(); ev.stopPropagation(); _dh=p;_di=img;_dx=ev.clientX;_ow=img.offsetWidth; document.addEventListener('mousemove',onIM); document.addEventListener('mouseup',onIU); });
    wrap.appendChild(h);
  });
  wrap.appendChild(img); wrap.appendChild(bar);
  // Click anywhere on the image block selects it and shows the toolbar.
  // We add the handler on img, wrap AND outer to be robust — QWebEngineView
  // does not reliably forward pointer-events:none through img to wrap,
  // so relying solely on CSS pointer-events is not sufficient.
  function _selectThisImg(e){
    e.stopPropagation();
    selectImg(wrap);
    _lastFocusedRow   = row;
    _focusedContainer = null;
  }
  // Register on img, wrap AND outer so click always registers regardless of
  // which sub-element the browser decides is the event target.
  [img, wrap, outer].forEach(el => el.addEventListener('click', _selectThisImg));

  outer.appendChild(wrap); row.appendChild(outer); container.appendChild(row);
  return row;
}
function onIM(e){ if(!_di)return; const nw=Math.max(40,['tr','mr','br'].includes(_dh)?_ow+(e.clientX-_dx):['tl','ml','bl'].includes(_dh)?_ow-(e.clientX-_dx):_ow); _di.style.width=nw+'px'; _di.dataset.w=nw; }
function onIU(){ _dh=null;_di=null; document.removeEventListener('mousemove',onIM); document.removeEventListener('mouseup',onIU); notify(); }
function selectImg(w){ deselectImgs(); w.classList.add('sel'); }
function deselectImgs(){ document.querySelectorAll('.img-wrap.sel').forEach(w=>w.classList.remove('sel')); }
document.addEventListener('click', e => { if(!tgt(e).closest('.img-wrap,.img-bar')) deselectImgs(); });

// ── addTableRow ──────────────────────────────────────────────────────────────
function addTableRow(container, rowsData, focus, bg){
  const row=document.createElement('div'); row.className='blk-row';
  if(bg)row.classList.add(bg);
  row.appendChild(makeDragHandle());

  // Outer wrapper: position:relative so add-col btn can be absolute
  const outer=document.createElement('div');
  outer.className='resizable-outer';
  outer.dataset.align='center';
  outer.style.cssText='flex:1;position:relative;overflow:visible;';

  // Floating hover toolbar (width/align/delete)
  const bar=document.createElement('div');
  bar.style.cssText='position:absolute;top:-34px;left:50%;transform:translateX(-50%);'+
    'background:#10182a;border:1px solid #2a3354;border-radius:8px;padding:4px 8px;'+
    'display:none;gap:4px;white-space:nowrap;z-index:20;'+
    'box-shadow:0 4px 16px rgba(0,0,0,.5);align-items:center;';
  const mkB=(t,fn)=>{const b=document.createElement('button');b.textContent=t;
    b.style.cssText='background:transparent;border:none;color:#e8edf8;font-size:11px;cursor:pointer;padding:3px 8px;border-radius:5px;';
    b.onmouseover=()=>b.style.background='#2a3354';b.onmouseout=()=>b.style.background='transparent';
    b.onmousedown=e=>{e.preventDefault();fn();};return b;};
  const _sp=document.createElement('div');_sp.style.cssText='width:1px;background:#2a3354;margin:2px 4px;align-self:stretch;';
  ['25%','50%','75%','100%'].forEach(w=>bar.appendChild(mkB(w,()=>{setW(w);})));
  bar.appendChild(_sp);
  [['◀','left'],['■','center'],['▶','right']].forEach(([l,a])=>bar.appendChild(mkB(l,()=>{setAlign(a);})));
  bar.appendChild(_sp.cloneNode());
  bar.appendChild(mkB('🗑',()=>{row.remove();notify();}));
  outer.appendChild(bar);
  outer.addEventListener('mouseenter',()=>{ barCancelHide(); bar.style.display='flex'; });
  outer.addEventListener('mouseleave',()=>barDelayHide(bar));

  // tblOuter: inline-block so width control works, has room for add-col on right
  const tblOuter=document.createElement('div');
  tblOuter.className='tbl-outer';
  tblOuter.style.width='50%';  // default 50%
  tblOuter.style.marginLeft='auto';tblOuter.style.marginRight='auto';  // default center

  const tbl=document.createElement('table');tbl.className='blk-table';

  function setW(w){ tblOuter.style.width=w; outer.dataset.w=w; notify(); }
  function setAlign(a){
    outer.dataset.align=a;
    if(a==='center'){tblOuter.style.marginLeft='auto';tblOuter.style.marginRight='auto';}
    else if(a==='right'){tblOuter.style.marginLeft='auto';tblOuter.style.marginRight='0';}
    else{tblOuter.style.marginLeft='0';tblOuter.style.marginRight='0';}
    notify();
  }

  const attachCell=c=>{
    c.contentEditable=_ro?'false':'true';
    attachPh(c);c.addEventListener('input',notifyDebounced);
    c.addEventListener('focus',()=>{_focusedContainer=null;_lastFocusedRow=row;});
  };
  function realCols(){ return tbl.rows[0]?tbl.rows[0].cells.length:2; }

  function addR(){
    const nr=tbl.insertRow();
    for(let i=0;i<realCols();i++){attachCell(nr.insertCell());}
    notify();
  }
  function addC(){
    for(let i=0;i<tbl.rows.length;i++){attachCell(tbl.rows[i].insertCell());}
    notify();
  }

  // Populate rows
  const isDefault=!rowsData||rowsData.length===0;
  if(isDefault)rowsData=[[{html:''},{html:''}],[{html:''},{html:''}]];
  rowsData.forEach(rd=>{
    const tr=tbl.insertRow();
    rd.forEach(cd=>{
      const td=tr.insertCell();
      td.innerHTML=typeof cd==='string'?cd:(cd.html||'');
      if(typeof cd==='object'&&cd.w)td.style.width=cd.w;
      attachCell(td);
    });
  });

  // Right-click context menu
  tbl.addEventListener('contextmenu',ev=>{
    const td=ev.target.closest('td');if(!td)return;
    ev.preventDefault();ev.stopPropagation();closeMenus();
    const menu=document.createElement('div');menu.className='ctx-menu';
    const mk=(l,fn,d=false)=>{const el=document.createElement('div');el.className='ctx-item'+(d?' danger':'');el.textContent=l;el.addEventListener('mousedown',e=>{e.preventDefault();fn();closeMenus();});return el;};
    const tr2=td.closest('tr'),rowIdx=Array.from(tbl.rows).indexOf(tr2);
    const colIdx=Array.from(tr2.cells).indexOf(td);
    menu.appendChild(mk('＋ Row above',()=>{const nr=tbl.insertRow(rowIdx);for(let i=0;i<realCols();i++)attachCell(nr.insertCell());notify();}));
    menu.appendChild(mk('＋ Row below',()=>{const nr=tbl.insertRow(rowIdx+1);for(let i=0;i<realCols();i++)attachCell(nr.insertCell());notify();}));
    menu.appendChild(mk('＋ Col left', ()=>{for(let i=0;i<tbl.rows.length;i++)attachCell(tbl.rows[i].insertCell(colIdx));notify();}));
    menu.appendChild(mk('＋ Col right',()=>{for(let i=0;i<tbl.rows.length;i++)attachCell(tbl.rows[i].insertCell(colIdx+1));notify();}));
    const sep=document.createElement('div');sep.className='ctx-sep';menu.appendChild(sep);
    menu.appendChild(mk('🗑 Delete row',()=>{if(tbl.rows.length>1){tbl.deleteRow(rowIdx);notify();}},true));
    menu.appendChild(mk('🗑 Delete col',()=>{if(realCols()>1){for(let i=0;i<tbl.rows.length;i++)tbl.rows[i].deleteCell(colIdx);notify();}},true));
    menu.appendChild(mk('🗑 Delete table',()=>{row.remove();notify();},true));
    const sep2=document.createElement('div');sep2.className='ctx-sep';menu.appendChild(sep2);
    menu.appendChild(mk((tbl.classList.contains('has-header')?'✓ ':'')+'Header row',()=>{tbl.classList.toggle('has-header');notify();}));
    menu.appendChild(mk((tbl.classList.contains('has-col-header')?'✓ ':'')+'Header column',()=>{tbl.classList.toggle('has-col-header');notify();}));
    adjustMenu(menu,ev.clientX,ev.clientY);
  });

  // Add row button — full width of table, appears on hover near bottom
  const addRowBtn=document.createElement('button');
  addRowBtn.className='tbl-add-row';addRowBtn.textContent='＋';
  addRowBtn.title='Add row';addRowBtn.addEventListener('click',addR);

  // Add col button — full height, appears on hover near right edge
  const addColBtn=document.createElement('button');
  addColBtn.className='tbl-add-col';addColBtn.textContent='＋';
  addColBtn.title='Add column';addColBtn.addEventListener('click',addC);

  tblOuter.appendChild(tbl);
  tblOuter.appendChild(addRowBtn);
  tblOuter.appendChild(addColBtn);
  outer.appendChild(tblOuter);
  row.appendChild(outer);container.appendChild(row);
  if(focus){const f=tbl.querySelector('td');if(f)f.focus();}
  return row;
}

// ── Context menus ─────────────────────────────────────────────────────────────
function closeMenus(){ document.querySelectorAll('.ctx-menu,.ctx-sub-popup').forEach(m=>m.remove()); }
function closeMenusOnExternal(e){ if(!tgt(e).closest('.ctx-menu') && !tgt(e).closest('.ctx-sub-popup')){ closeMenus(); document.removeEventListener('mousedown',closeMenusOnExternal); } }
function closeOnExt(e){ if(!tgt(e).closest('.ctx-menu') && !tgt(e).closest('.ctx-sub-popup')){ closeMenus(); document.removeEventListener('mousedown',closeOnExt); } }
function adjustMenu(menu, x, y){
  menu.style.cssText += 'position:fixed;visibility:hidden;';
  document.body.appendChild(menu);
  const w=menu.offsetWidth, h=menu.offsetHeight, margin=8;
  let left=x, top=y;
  if(x+w+margin>window.innerWidth)  left=window.innerWidth-w-margin;
  if(y+h+margin>window.innerHeight) top=Math.max(margin, y-h);
  left=Math.max(margin, left);
  menu.style.left=left+'px'; menu.style.top=top+'px'; menu.style.visibility='visible';
  setTimeout(()=>document.addEventListener('mousedown',closeOnExt),10);
}

// ── Block type conversion helper ──────────────────────────────────────────────
function _serializeRow(row){
  // Return an array of blocks for this single row
  const b=[]; serializeContainer_row(row,b); return b;
}
function serializeContainer_row(row, out){
  // Reuse serializeContainer logic but for a single row
  const tmp=document.createElement('div');
  tmp.appendChild(row.cloneNode(true));
  const res=serializeContainer(tmp);
  res.forEach(b=>out.push(b));
}

function _rowType(row){
  if(row.querySelector(':scope>.tgl-row'))        return 'toggle';
  if(row.querySelector(':scope>.task-row'))       return 'task';
  if(row.querySelector(':scope>.callout-wrap'))   return 'callout';
  if(row.querySelector(':scope>.quote-outer'))    return 'quote';
  if(row.querySelector(':scope>.code-outer'))     return 'code';
  if(row.querySelector(':scope>.img-outer'))      return 'image';
  if(row.querySelector(':scope>.blk-table-wrap')) return 'table';
  const blk = row.querySelector(':scope>.block');
  if(!blk) return 'unknown';

  // ── 1. data-blk-type is canonical (set by turnInto / deserialization) ──────
  const bt = blk.dataset.blkType || '';
  const _btMap = {h1:'heading1', h2:'heading2', h3:'heading3', h4:'heading4',
                  bullet:'bullet', numbered:'numbered'};
  if(bt && _btMap[bt]) return _btMap[bt];
  if(bt !== undefined && bt !== null && bt !== '' && !_btMap[bt]) return 'text';

  // ── 2. Fallback: detect from inner HTML (imported / execCommand blocks) ─────
  if(blk.querySelector('h1'))  return 'heading1';
  if(blk.querySelector('h2'))  return 'heading2';   // separate — was wrongly grouped with h1
  if(blk.querySelector('h3'))  return 'heading3';   // was mapped to heading2
  if(blk.querySelector('h4'))  return 'heading4';
  if(blk.querySelector('ul'))  return 'bullet';
  if(blk.querySelector('ol'))  return 'numbered';
  return 'text';
}

function _getRowText(row){
  const el=row.querySelector('.block,.tgl-title,.task-text,.quote-block,.callout-body');
  return el ? el.innerHTML : '';
}

function showBlockMenu(row, x, y){
  closeMenus();
  const menu=document.createElement('div'); menu.className='ctx-menu';

  const mkItem=(label, fn, danger=false)=>{
    const d=document.createElement('div'); d.className='ctx-item'+(danger?' danger':'');
    d.textContent=label; d.addEventListener('mousedown',e=>{ e.preventDefault(); fn(); closeMenus(); });
    return d;
  };
  let _subCloseTimer = null;
  const mkSub=(label, buildFn)=>{
    const d=document.createElement('div'); d.className='ctx-item';
    d.innerHTML=label+' <span style="margin-left:auto;opacity:.5;font-size:10px">▶</span>';
    d.style.cssText='display:flex;align-items:center;gap:6px;';

    const openSub=()=>{
      if(_subCloseTimer){ clearTimeout(_subCloseTimer); _subCloseTimer=null; }
      // Close other submenus
      document.querySelectorAll('.ctx-sub-popup').forEach(m=>m.remove());

      const sub=document.createElement('div');
      sub.className='ctx-menu ctx-sub-popup';
      sub.style.cssText='position:fixed;z-index:10002;min-width:170px;';
      buildFn(sub);
      document.body.appendChild(sub);

      // Position using getBoundingClientRect
      const rect=d.getBoundingClientRect();
      const margin=8;
      let left=rect.right+4;
      let top=rect.top;
      // Flip left if off-screen
      if(left+sub.offsetWidth+margin > window.innerWidth)
        left=rect.left-sub.offsetWidth-4;
      // Flip up if off-screen
      if(top+sub.offsetHeight+margin > window.innerHeight)
        top=window.innerHeight-sub.offsetHeight-margin;
      sub.style.left=left+'px';
      sub.style.top=Math.max(margin,top)+'px';

      // Keep open while hovering trigger or sub

// ── Turn Into converter ────────────────────────────────────────────────────────
function _extractInline(html){
  // Extract inline-formatted content from block-level HTML (ul/ol/h1-h6)
  // preserving bold, italic, links etc. but stripping block wrappers.
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  const lis = tmp.querySelectorAll('li');
  if(lis.length) return Array.from(lis).map(li=>li.innerHTML).join(' ');
  const hd = tmp.querySelector('h1,h2,h3,h4,h5,h6');
  if(hd) return hd.innerHTML;
  return tmp.innerHTML;
}

function turnInto(row, targetType){
  const rawHtml  = _getRowText(row);
  const inline   = _extractInline(rawHtml);   // inline HTML preserving bold/italic
  const txt      = inline.replace(/<[^>]+>/g,'').trim();
  const container = row.parentElement || root;
  let nr;

  // Map TURN_INTO type → data-blk-type value used by CSS
  const _typeToBlk = {
    heading1:'h1', heading2:'h2', heading3:'h3', heading4:'h4',
    bullet:'bullet', numbered:'numbered'
  };

  if(targetType === 'text'){
    nr = addTextRow(container, inline);
    const blk = nr?.querySelector('.block');
    if(blk) blk.dataset.blkType = '';

  } else if(_typeToBlk[targetType]){
    // Heading / bullet / numbered → plain text block + data-blk-type for CSS
    const blkType = _typeToBlk[targetType];
    nr = addTextRow(container, txt || '');
    const blk = nr?.querySelector('.block');
    if(blk){
      blk.dataset.blkType = blkType;
      if(blkType === 'numbered') blk.dataset.num = '1';
    }

  } else if(targetType === 'task'){
    nr = addTaskRow(container, txt||'Task', false, genId());

  } else if(targetType === 'quote'){
    nr = addQuoteRow(container, inline||'', 'left', '100%');

  } else if(targetType === 'toggle'){
    nr = addToggleRow(container, txt||'Toggle', true, []);

  } else if(targetType === 'code'){
    nr = addCodeRow ? addCodeRow(container, txt||'')
                    : addTextRow(container, `<code>${txt}</code>`);

  } else if(targetType === 'callout'){
    nr = addCalloutRow(container, '💡', [{t:'text', html:inline}], 'blue', 'left', '100%');
  }

  if(nr){
    for(const cls of row.classList){ if(cls.startsWith('bg-')) nr.classList.add(cls); }
    row.after(nr); row.remove();
    const focus = nr.querySelector(
      '.block,.tgl-title,.task-text,.quote-block,.callout-children .block,.code-block');
    if(focus){ focus.focus(); placeCaretAtEnd(focus); }
    notify();
  }
}

// Right-click: NATIVE browser menu everywhere (copy/paste/select).
// Block menu (duplicate/color/delete) is ONLY via 9-dot drag handle left-click.
// Table operations via right-click on table cells (already handled inside addTableRow).
document.addEventListener('contextmenu', e => {
  // Allow native right-click on drag handle area (no menu there)
  if(tgt(e).closest('.drag-handle')) { e.preventDefault(); return; }

  // Task row right-click → due date context menu
  const taskRow = tgt(e).closest('.blk-row[data-block-id]');
  if(taskRow && taskRow.querySelector(':scope > .task-row')){
    e.preventDefault();
    showTaskMenu(taskRow, e.clientX, e.clientY);
    return;
  }

  // If clicking on or inside a link, show our custom menu with Unlink option
  const linkEl = tgt(e).closest('a');
  if(linkEl && linkEl.closest('.block, .tgl-title, .callout-children, .quote-block')){
    e.preventDefault();
    showLinkMenu(linkEl, e.clientX, e.clientY);
    return;
  }
  // Allow native context menu everywhere else
});

function _updateTaskDueBadge(row, dateStr){
  let badge = row.querySelector('.task-due-badge');
  if(!dateStr){
    if(badge) badge.remove();
    return;
  }
  if(!badge){
    badge = document.createElement('span');
    badge.className = 'task-due-badge';
    badge.style.cssText = 'font-size:10px;margin-left:6px;padding:1px 5px;border-radius:3px;background:#2a2f4a;color:#89b4fa;white-space:nowrap;';
    row.appendChild(badge);
  }
  badge.dataset.due = dateStr;
  // Format dd/mm
  const [y,m,d] = dateStr.split('-');
  const today = new Date(); today.setHours(0,0,0,0);
  const due   = new Date(+y, +m-1, +d);
  const overdue = due < today;
  badge.style.background = overdue ? '#3d1f2a' : '#2a2f4a';
  badge.style.color       = overdue ? '#f38ba8' : '#89b4fa';
  badge.textContent = `📅 ${d}/${m}`;
}
